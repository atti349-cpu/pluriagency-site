<script type="text/babel">
// Neural OS v2 — UI: Sidebar, TopBar, NodePanel, EditorPanel
// Editor supporta: creazione/modifica nodi (con cluster), aggiunta/rimozione link, modifica link esistenti.
const { useState, useMemo, useEffect, useRef } = React;

function Sidebar({ data, activeCats, setActiveCats, activeClusters, setActiveClusters, searchQuery, setSearchQuery, totals, focusNode, openEditor, openClusterEditor, isOpen, readOnly }) {
  const cats = Object.entries(data.categories);
  const toggle = (key) => {
    const next = new Set(activeCats);
    if (key === "all") return setActiveCats(new Set(["all", ...Object.keys(data.categories)]));
    next.delete("all");
    if (next.has(key)) next.delete(key); else next.add(key);
    if (next.size === 0) next.add("all");
    setActiveCats(next);
  };
  const isActive = (k) => activeCats.has("all") || activeCats.has(k);
  const toggleCluster = (id) => {
    const next = new Set(activeClusters);
    next.delete("all");
    if (next.has(id)) next.delete(id); else next.add(id);
    if (next.size === 0) next.add("all");
    setActiveClusters(next);
  };
  const isClusterActive = (id) => activeClusters.has("all") || activeClusters.has(id);

  // Solo nebulose top-level: isClusterHead:true E senza un cluster padre
  // GIT (cluster:pluriagency), THINKR (cluster:startup), LORENZO_C/PLURI_C (cluster:clienti)
  // vengono esclusi — compaiono quando si filtra la loro galassia madre
  const clusterHeads = useMemo(() =>
    data.nodes.filter(n => n.isClusterHead === true && (!n.cluster || n.cluster === n.id)),
  [data]);

  return (
    <div className={`panel sidebar${isOpen ? " open" : ""}`}>
      <div className="brand">
        <div className="brand-mark"><span/></div>
        <div>
          <div className="brand-title">NEURAL OS</div>
          <div className="brand-sub">Sistema operativo personale · 3D</div>
        </div>
      </div>
      <div className="counts">
        <div className="count-row main" onClick={() => toggle("all")}>
          <span className="dot" style={{background:"#fff"}}/>
          <span>Tutti i nodi</span>
          <div style={{display:"flex",alignItems:"center",gap:"6px",marginLeft:"auto"}}>
            <span className="num">{totals.nodes}</span>
            <button className="hide-all-btn" onClick={e => { e.stopPropagation(); setActiveCats(new Set()); setActiveClusters(new Set()); }} title="Nascondi tutti">⊘</button>
          </div>
        </div>
        {cats.filter(([k]) => k !== "hub").map(([k, c]) => (
          <div key={k} className={`count-row ${isActive(k) ? "on" : "off"}`} onClick={() => toggle(k)}>
            <span className="dot" style={{background:c.color, boxShadow:`0 0 10px ${c.color}`}}/>
            <span>{c.label}</span>
            <span className="num">{totals.byCat[k] || 0}</span>
          </div>
        ))}
      </div>
      {clusterHeads.length > 0 && (
        <div className="nebula-filters">
          <div className="nebula-title">Nebulose</div>
          {clusterHeads.map(n => {
            const col = data.categories[n.category]?.color || "#fff";
            return (
              <div key={n.id} className={`nebula-row ${isClusterActive(n.id) ? "on" : "off"}`} onClick={() => toggleCluster(n.id)}>
                <span className="dot" style={{background: col, boxShadow: isClusterActive(n.id) ? `0 0 8px ${col}` : "none"}}/>
                <span>{n.label}</span>
              </div>
            );
          })}
        </div>
      )}
      <div className="search">
        <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Cerca nel grafo…" spellCheck={false}/>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </div>
      {!readOnly && (
        <div className="dual-btns">
          <button className="big-btn" onClick={openEditor}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>
            Aggiungi nodo / link
          </button>
          <button className="big-btn cluster" onClick={openClusterEditor} title="Crea una nuova sotto-nebulosa">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9" strokeDasharray="2 3"/></svg>
            Sotto-nebulosa
          </button>
        </div>
      )}
      {readOnly && (
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'.6rem',color:'var(--dim)',textAlign:'center',padding:'.5rem 0',letterSpacing:'.06em',opacity:.7}}>
          👁 sola lettura
        </div>
      )}
      <div className="quick-list">
        <div className="quick-title">CORE</div>
        {data.nodes.filter(n => ["hub","pluriagency","disfatti","thinkr","selekt","lorenzo_industrie","ai_local"].includes(n.id)).map(n => (
          <div key={n.id} className="quick-item" onClick={() => focusNode(n.id)}>
            <span className="dot" style={{background: data.categories[n.category].color, boxShadow:`0 0 8px ${data.categories[n.category].color}`}}/>
            <span className="qlabel">{n.label}</span>
          </div>
        ))}
        {clusterHeads.length > 0 && (
          <>
            <div className="quick-title" style={{marginTop:8}}>SOTTONEBULOSE</div>
            {clusterHeads.map(n => (
              <div key={n.id} className="quick-item" onClick={() => focusNode(n.id)}>
                <span className="dot" style={{background: data.categories[n.category].color, boxShadow:`0 0 8px ${data.categories[n.category].color}`}}/>
                <span className="qlabel">{n.label}</span>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

function TopBar({ totals, focusMode, setFocusMode, selectedId, onCenter, onToggleSidebar, userEmail, isReadOnly, teamMembers, viewingAs, onSwitchView, onLogout }) {
  return (
    <div className="topbar">
      <button className="tb-menu-btn" onClick={onToggleSidebar} title="Menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div className="tb-left">
        <span className="kbd-mono">NEURAL OS</span>
        <span className="dim tb-hide-sm">/</span>
        <span className="dim tb-hide-sm">3D</span>
      </div>
      <div className="tb-mid tb-hide-sm">
        <span className="pulse-dot"/>
        {totals.nodes} nodi · {totals.links} sinapsi
      </div>
      <div className="tb-right">
        {teamMembers.length > 0 && (
          <select
            value={viewingAs || userEmail}
            onChange={e => onSwitchView(e.target.value)}
            title={isReadOnly ? `Sola lettura — nebula di ${viewingAs}` : 'La tua nebula'}
            style={{background:'rgba(139,92,246,.12)',border:'1px solid rgba(139,92,246,.28)',color:isReadOnly?'#f59e0b':'var(--accent)',fontFamily:"'JetBrains Mono',monospace",fontSize:'.6rem',padding:'.22rem .45rem',cursor:'pointer',outline:'none',maxWidth:'150px'}}>
            <option value={userEmail}>● La mia</option>
            {teamMembers.filter(m => m.email !== userEmail).map(m => (
              <option key={m.email} value={m.email}>{m.name}</option>
            ))}
          </select>
        )}
        <button className={`tb-btn ${focusMode ? "on" : ""}`} disabled={!selectedId} onClick={() => setFocusMode(v => !v)} title="Modalità focus sul nodo selezionato">
          Focus
        </button>
        <button className="tb-btn" onClick={onCenter} title="Centra la vista sull'hub">Centra</button>
        {userEmail && <button className="topbar-logout" onClick={onLogout} title={`Esci (${userEmail})`}>↩</button>}
      </div>
    </div>
  );
}

function NodePanel({ data, node, onClose, focusNode, setFocusMode, focusMode, onEdit, onDelete, onSaveUrl, onCreateConnected, onSaveTask, readOnly, onGetPinned, onTogglePin }) {
  if (!node) return null;
  const cat = data.categories[node.category];
  const [pinned, setPinned] = React.useState(() => onGetPinned?.() || false);
  // Reset pin state quando cambia il nodo selezionato
  React.useEffect(() => { setPinned(onGetPinned?.() || false); }, [node.id]);
  const [urlEdit, setUrlEdit] = React.useState(false);
  const [urlValue, setUrlValue] = React.useState(node.url || "");
  const [taskInput, setTaskInput] = React.useState("");
  const [doneOpen, setDoneOpen] = React.useState(false);
  const [editingTaskId, setEditingTaskId] = React.useState(null);
  const [editingTaskText, setEditingTaskText] = React.useState("");
  React.useEffect(() => { setUrlValue(node.url || ""); setUrlEdit(false); setTaskInput(""); setDoneOpen(false); setEditingTaskId(null); }, [node.id]);

  const _gid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
  const tasks = node.tasks || [];
  const activeTasks = tasks.filter(t => t.status !== "done");
  const doneTasks = tasks.filter(t => t.status === "done");
  const wipCount = activeTasks.filter(t => t.status === "wip").length;

  const addTask = () => {
    if (!taskInput.trim()) return;
    onSaveTask(node.id, [...tasks, { id: _gid(), text: taskInput.trim(), status: "todo" }]);
    setTaskInput("");
  };
  const toggleWip = (id) => onSaveTask(node.id, tasks.map(t => t.id === id ? { ...t, status: t.status === "wip" ? "todo" : "wip" } : t));
  const markDone = (id) => onSaveTask(node.id, tasks.map(t => t.id === id ? { ...t, status: "done" } : t));
  const restoreTask = (id) => onSaveTask(node.id, tasks.map(t => t.id === id ? { ...t, status: "todo" } : t));
  const startEditTask = (t) => { setEditingTaskId(t.id); setEditingTaskText(t.text); };
  const saveEditTask = (id) => { if (editingTaskText.trim()) onSaveTask(node.id, tasks.map(t => t.id === id ? { ...t, text: editingTaskText.trim() } : t)); setEditingTaskId(null); };
  const deleteTask = (id) => onSaveTask(node.id, tasks.filter(t => t.id !== id));
  const confirmUrl = () => { onSaveUrl(node.id, urlValue); setUrlEdit(false); };
  const cancelUrl  = () => { setUrlEdit(false); setUrlValue(node.url || ""); };
  const conns = data.links
    .filter(l => l.source === node.id || l.target === node.id)
    .map((l, i) => {
      const otherId = l.source === node.id ? l.target : l.source;
      const other = data.nodes.find(n => n.id === otherId);
      return { other, type: l.type, idx: i };
    })
    .filter(x => x.other);
  const cluster = node.cluster && node.cluster !== node.id ? data.nodes.find(n => n.id === node.cluster) : null;
  return (
    <>
    <div className="panel detail">
      <div className="detail-handle"/>
      <button className="detail-close-mobile" onClick={onClose}>
        ✕ &nbsp; CHIUDI
      </button>
      <div className="detail-head">
        <div className="detail-cat" style={{borderColor: cat.color, color: cat.color, boxShadow:`inset 0 0 12px ${cat.color}33`}}>
          {cat.label.toUpperCase()}
        </div>
        <button className="x-btn" onClick={onClose} aria-label="Chiudi">✕</button>
      </div>
      <div className="detail-title-row">
        <div className="node-orb" style={{background:`radial-gradient(circle, ${cat.color}66, ${cat.color}00 70%)`, borderColor: cat.color, color: cat.color}}/>
        <h2>{node.label}</h2>
      </div>
      <div className="detail-id">id: <span>{node.id}</span> · type: <span>{node.type}</span> · size: <span>{node.size}</span></div>
      {cluster && <div className="detail-id">cluster: <span>{cluster.label}</span></div>}
      {node.description && <p className="detail-desc">{node.description}</p>}
      {!readOnly && (urlEdit || !node.url) ? (
        <div className="url-input-row">
          <input className="url-input" value={urlValue} onChange={e => setUrlValue(e.target.value)}
            placeholder="https://..." autoFocus
            onKeyDown={e => { if(e.key==='Enter') confirmUrl(); if(e.key==='Escape') cancelUrl(); }}/>
          <button className="url-confirm-btn" onClick={confirmUrl}>✓</button>
          {urlEdit && <button className="url-cancel-btn" onClick={cancelUrl}>✕</button>}
        </div>
      ) : node.url ? (
        <div className="url-row">
          <a className="detail-url" href={node.url} target="_blank" rel="noopener noreferrer">
            <span>{node.url.replace(/^https?:\/\//,"")}</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 17L17 7"/><path d="M8 7h9v9"/></svg>
          </a>
          {!readOnly && <button className="url-edit-btn" onClick={() => setUrlEdit(true)} title="Modifica URL">✎</button>}
        </div>
      ) : null}
      <div className="task-section">
        <div className="task-section-head">
          <span className="task-section-title">Tasks</span>
          {wipCount > 0 && <span className="task-wip-badge">▶ {wipCount} in lavorazione</span>}
        </div>
        {!readOnly && (
          <div className="task-input-row">
            <input className="task-input" value={taskInput} onChange={e => setTaskInput(e.target.value)}
              placeholder="Aggiungi task…"
              onKeyDown={e => e.key === "Enter" && addTask()}/>
            <button className="task-add-btn" onClick={addTask}>+</button>
          </div>
        )}
        {activeTasks.map(t => (
          <div key={t.id} className="task-row">
            {!readOnly && editingTaskId === t.id ? (
              <input className="task-input" style={{fontSize:"11px",padding:"3px 8px"}} value={editingTaskText}
                autoFocus
                onChange={e => setEditingTaskText(e.target.value)}
                onKeyDown={e => { if(e.key==="Enter") saveEditTask(t.id); if(e.key==="Escape") setEditingTaskId(null); }}
                onBlur={() => saveEditTask(t.id)}/>
            ) : (
              <span className={`task-text${t.status === "wip" ? " wip" : ""}`}
                onClick={() => !readOnly && startEditTask(t)}
                style={{cursor: readOnly ? "default" : "text"}}>
                {t.text}
              </span>
            )}
            {!readOnly && <>
              <button className={`task-wip-btn${t.status === "wip" ? " active" : ""}`} onClick={() => toggleWip(t.id)} title="In lavorazione">▶</button>
              <button className="task-done-btn" onClick={() => markDone(t.id)} title="Segna come fatta">✓</button>
              <button className="task-restore-btn" onClick={() => deleteTask(t.id)} title="Elimina task" style={{color:"rgba(255,80,80,0.5)"}}>✕</button>
            </>}
          </div>
        ))}
        {doneTasks.length > 0 && (
          <div>
            <div className="task-done-toggle" onClick={() => setDoneOpen(v => !v)}>
              {doneOpen ? "▾" : "▸"} {doneTasks.length} completat{doneTasks.length === 1 ? "a" : "e"}
            </div>
            {doneOpen && doneTasks.map(t => (
              <div key={t.id} className="task-done-row">
                <span className="task-done-text">{t.text}</span>
                <button className="task-restore-btn" onClick={() => restoreTask(t.id)} title="Riapri">↶</button>
              </div>
            ))}
          </div>
        )}
      </div>
      <div className="detail-actions">
        <button className="act-btn primary" onClick={() => setFocusMode(true)}>{focusMode ? "Focus attivo" : "Focus"}</button>
        {!readOnly && <button className="act-btn" onClick={() => onEdit(node)}>Modifica</button>}
        {!readOnly && (
          <button className="act-btn new-planet-btn" onClick={onCreateConnected} title="Crea nuovo pianeta collegato a questo">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="7" x2="12" y2="17"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
            Pianeta
          </button>
        )}
        {!readOnly && (
          <button className={`pin-btn${pinned ? " pinned" : ""}`}
            onClick={() => { const np = onTogglePin?.(); setPinned(np || false); }}
            title={pinned ? "Clicca per liberare il pianeta (o doppio-click sul nodo)" : "Clicca per fissare il pianeta in posizione"}>
            {pinned ? "📍 Pinnato" : "◎ Libero"}
          </button>
        )}
      </div>
      <div className="detail-section">
        <div className="section-title">Connessioni · {conns.length}</div>
        <div className="conn-list">
          {conns.map(({ other, type }) => {
            const oc = data.categories[other.category];
            return (
              <div key={other.id} className="conn-row" onClick={() => focusNode(other.id)}>
                <span className="dot" style={{background: oc.color, boxShadow:`0 0 8px ${oc.color}`}}/>
                <span className="cn-label">{other.label}</span>
                <span className="cn-type">{type}</span>
              </div>
            );
          })}
          {conns.length === 0 && <div className="empty">Nessuna connessione.</div>}
        </div>
      </div>
      {!readOnly && node.id !== "hub" && (
        <button className="danger-btn" onClick={() => onDelete(node)}>Elimina nodo</button>
      )}
    </div>
    </>
  );
}

function EditorPanel({ data, onClose, onSave, editingNode, defaultConnect, defaultCluster }) {
  const isEdit = !!editingNode;
  const [tab, setTab] = useState("node");
  const slugify = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"").slice(0,40);
  const [label, setLabel] = useState(editingNode?.label || "");
  const [id, setId] = useState(editingNode?.id || "");
  const [category, setCategory] = useState(editingNode?.category || "custom");
  const [size, setSize] = useState(editingNode?.size || 1.6);
  const [url, setUrl] = useState(editingNode?.url || "");
  const [description, setDescription] = useState(editingNode?.description || "");
  const [cluster, setCluster] = useState(editingNode?.cluster || defaultCluster || "");
  const [connectIds, setConnectIds] = useState(new Set(defaultConnect ? [defaultConnect] : ["hub"]));
  const [linkType, setLinkType] = useState("custom");
  const existingLinks = useMemo(() => {
    if (!isEdit) return [];
    return data.links
      .map(l => ({ ...l, _key: `${l.source}__${l.target}` }))
      .filter(l => l.source === editingNode.id || l.target === editingNode.id);
  }, [data, editingNode, isEdit]);
  const [linkPatches, setLinkPatches] = useState({});
  const [pendingLinks, setPendingLinks] = useState([]);
  const [newLinkTarget, setNewLinkTarget] = useState("");
  const [newLinkType, setNewLinkType] = useState("custom");
  const [linkSource, setLinkSource] = useState(data.nodes[0]?.id || "");
  const [linkTarget, setLinkTarget] = useState("");
  const [linkTypeOnly, setLinkTypeOnly] = useState("custom");
  useEffect(() => { if (!isEdit && label) setId(slugify(label)); }, [label, isEdit]);
  const toggleConnect = (nid) => { const next = new Set(connectIds); if (next.has(nid)) next.delete(nid); else next.add(nid); setConnectIds(next); };
  const submitNode = () => {
    if (!label.trim()) return alert("Inserisci un'etichetta.");
    let finalId = id.trim() || slugify(label);
    if (!isEdit && data.nodes.some(n => n.id === finalId)) finalId = finalId + "_" + Math.random().toString(36).slice(2,5);
    const node = { id: finalId, type: category, category, label: label.trim(), size: Number(size) || 1.6, url: url.trim() || undefined, description: description.trim() || undefined, cluster: cluster || undefined };
    if (isEdit) {
      onSave({ kind: "edit_node", node, originalId: editingNode.id, linkPatches, addLinks: pendingLinks.map(pl => ({ source: editingNode.id, target: pl.target, type: pl.type })) });
    } else {
      onSave({ kind: "create_node", node, newLinks: [...connectIds].map(target => ({ source: finalId, target, type: linkType })) });
    }
  };
  const submitLink = () => {
    if (!linkSource || !linkTarget || linkSource === linkTarget) return alert("Seleziona due nodi diversi.");
    onSave({ kind: "link", link: { source: linkSource, target: linkTarget, type: linkTypeOnly } });
  };
  const patchLink = (key, patch) => setLinkPatches(prev => ({ ...prev, [key]: { ...(prev[key] === "removed" ? {} : prev[key] || {}), ...patch } }));
  const removeLink = (key) => setLinkPatches(prev => ({ ...prev, [key]: "removed" }));
  const restoreLink = (key) => setLinkPatches(prev => { const n = {...prev}; delete n[key]; return n; });
  const addPending = () => {
    if (!newLinkTarget) return;
    if (newLinkTarget === editingNode.id) return alert("Non puoi collegare un nodo a sé stesso.");
    if (existingLinks.some(l => (l.source === newLinkTarget || l.target === newLinkTarget))) return alert("Esiste già una connessione con questo nodo.");
    if (pendingLinks.some(p => p.target === newLinkTarget)) return;
    setPendingLinks([...pendingLinks, { target: newLinkTarget, type: newLinkType }]);
    setNewLinkTarget("");
  };
  const removePending = (target) => setPendingLinks(pendingLinks.filter(p => p.target !== target));
  const getLinkUI = (l) => {
    const otherId = l.source === editingNode.id ? l.target : l.source;
    const other = data.nodes.find(n => n.id === otherId);
    const removed = linkPatches[l._key] === "removed";
    const currentType = (linkPatches[l._key] && linkPatches[l._key] !== "removed" && linkPatches[l._key].type) || l.type;
    return { other, removed, currentType };
  };
  return (
    <div className="panel editor">
      <div className="editor-head">
        <div className="editor-title">{isEdit ? `Modifica · ${editingNode.label}` : "Aggiungi al grafo"}</div>
        <button className="x-btn" onClick={onClose}>✕</button>
      </div>
      <div className="tabs">
        <button className={`tab ${tab==="node"?"on":""}`} onClick={() => setTab("node")}>{isEdit ? "Dati nodo" : "Nuovo nodo"}</button>
        {isEdit && <button className={`tab ${tab==="links"?"on":""}`} onClick={() => setTab("links")}>Collegamenti ({existingLinks.length + pendingLinks.length})</button>}
        {!isEdit && <button className={`tab ${tab==="newlink"?"on":""}`} onClick={() => setTab("newlink")}>Solo connessione</button>}
      </div>
      {tab === "node" && (
        <div className="form">
          <label>Etichetta<input value={label} onChange={e => setLabel(e.target.value)} placeholder="Es. Mio Progetto"/></label>
          <label>ID {isEdit && <span className="hint-inline">(non modificabile)</span>}<input value={id} onChange={e => setId(slugify(e.target.value))} disabled={isEdit} placeholder="es. mio_progetto"/></label>
          <label>Categoria<select value={category} onChange={e => setCategory(e.target.value)}>{Object.entries(data.categories).filter(([k]) => k !== "hub").map(([k, c]) => <option key={k} value={k}>{c.label}</option>)}</select></label>
          <label>Sotto-nebulosa (cluster)<select value={cluster} onChange={e => setCluster(e.target.value)}><option value="">— nessuna (orbita libera) —</option>{data.nodes.filter(n => !isEdit || n.id !== editingNode.id).map(n => <option key={n.id} value={n.id}>↳ dentro {n.label}</option>)}</select><span className="hint-inline" style={{marginTop:4}}>I nodi con la stessa sotto-nebulosa orbitano attorno al loro head.</span></label>
          <label>URL (opzionale)<input value={url} onChange={e => setUrl(e.target.value)} placeholder="https://..."/></label>
          <label>Dimensione · {Number(size).toFixed(1)}<input type="range" min="1" max="3" step="0.1" value={size} onChange={e => setSize(e.target.value)}/></label>
          <label>Descrizione (opzionale)<textarea rows="3" value={description} onChange={e => setDescription(e.target.value)} placeholder="Cosa rappresenta questo nodo?"/></label>
          {!isEdit && (
            <>
              <label>Tipo di collegamento iniziale<select value={linkType} onChange={e => setLinkType(e.target.value)}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select></label>
              <div className="connect-block">
                <div className="connect-title">Collega a · {connectIds.size} selezionati</div>
                <div className="connect-grid">{data.nodes.map(n => <div key={n.id} className={`chip ${connectIds.has(n.id) ? "on" : ""}`} onClick={() => toggleConnect(n.id)} style={{borderColor: connectIds.has(n.id) ? data.categories[n.category].color : undefined}}><span className="dot" style={{background: data.categories[n.category].color}}/>{n.label}</div>)}</div>
              </div>
            </>
          )}
          <div className="form-actions">
            <button className="act-btn" onClick={onClose}>Annulla</button>
            <button className="act-btn primary" onClick={submitNode}>{isEdit ? "Salva modifiche" : "Crea nodo"}</button>
          </div>
        </div>
      )}
      {isEdit && tab === "links" && (
        <div className="form">
          <div className="connect-title">Collegamenti esistenti</div>
          {existingLinks.length === 0 && <div className="empty">Nessuna connessione esistente.</div>}
          {existingLinks.map(l => {
            const { other, removed, currentType } = getLinkUI(l);
            if (!other) return null;
            const oc = data.categories[other.category];
            return (
              <div key={l._key} className="link-edit-row" style={{opacity: removed ? 0.4 : 1}}>
                <span className="dot" style={{background: oc.color, boxShadow:`0 0 8px ${oc.color}`}}/>
                <span className="cn-label" style={{textDecoration: removed ? "line-through" : "none"}}>{other.label}</span>
                <select disabled={removed} value={currentType} onChange={e => patchLink(l._key, { type: e.target.value })}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select>
                {removed ? <button className="mini-btn" onClick={() => restoreLink(l._key)}>↶</button> : <button className="mini-btn danger" onClick={() => removeLink(l._key)}>✕</button>}
              </div>
            );
          })}
          {pendingLinks.length > 0 && (
            <>
              <div className="connect-title" style={{marginTop:14}}>Da aggiungere</div>
              {pendingLinks.map(pl => {
                const other = data.nodes.find(n => n.id === pl.target);
                if (!other) return null;
                const oc = data.categories[other.category];
                return (
                  <div key={pl.target} className="link-edit-row pending">
                    <span className="dot" style={{background: oc.color, boxShadow:`0 0 8px ${oc.color}`}}/>
                    <span className="cn-label">{other.label}</span>
                    <select value={pl.type} onChange={e => setPendingLinks(pendingLinks.map(p => p.target === pl.target ? {...p, type: e.target.value} : p))}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select>
                    <button className="mini-btn danger" onClick={() => removePending(pl.target)}>✕</button>
                  </div>
                );
              })}
            </>
          )}
          <div className="connect-title" style={{marginTop:14}}>Aggiungi nuovo collegamento</div>
          <div className="add-link-row">
            <select value={newLinkTarget} onChange={e => setNewLinkTarget(e.target.value)}><option value="">— scegli nodo —</option>{data.nodes.filter(n => n.id !== editingNode.id && !existingLinks.some(l => l.source === n.id || l.target === n.id) && !pendingLinks.some(p => p.target === n.id)).map(n => <option key={n.id} value={n.id}>{n.label}</option>)}</select>
            <select value={newLinkType} onChange={e => setNewLinkType(e.target.value)}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select>
            <button className="mini-btn" onClick={addPending}>+</button>
          </div>
          <div className="form-actions" style={{marginTop:12}}>
            <button className="act-btn" onClick={onClose}>Annulla</button>
            <button className="act-btn primary" onClick={submitNode}>Salva tutto</button>
          </div>
        </div>
      )}
      {!isEdit && tab === "newlink" && (
        <div className="form">
          <label>Sorgente<select value={linkSource} onChange={e => setLinkSource(e.target.value)}>{data.nodes.map(n => <option key={n.id} value={n.id}>{n.label}</option>)}</select></label>
          <label>Destinazione<select value={linkTarget} onChange={e => setLinkTarget(e.target.value)}><option value="">— scegli —</option>{data.nodes.filter(n => n.id !== linkSource).map(n => <option key={n.id} value={n.id}>{n.label}</option>)}</select></label>
          <label>Tipo<select value={linkTypeOnly} onChange={e => setLinkTypeOnly(e.target.value)}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select></label>
          <div className="form-actions">
            <button className="act-btn" onClick={onClose}>Annulla</button>
            <button className="act-btn primary" onClick={submitLink}>Crea connessione</button>
          </div>
        </div>
      )}
    </div>
  );
}

window.Sidebar = Sidebar;
window.TopBar = TopBar;
window.NodePanel = NodePanel;
window.EditorPanel = EditorPanel;

function ClusterCreator({ data, onClose, onSave }) {
  const slugify = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"").slice(0,40);
  const [label, setLabel] = useState("");
  const [id, setId] = useState("");
  const [category, setCategory] = useState("custom");
  const [size, setSize] = useState(2.0);
  const [description, setDescription] = useState("");
  const [linkToHub, setLinkToHub] = useState(true);
  const [linkType, setLinkType] = useState("core");
  const [memberIds, setMemberIds] = useState(new Set());
  useEffect(() => { if (label) setId(slugify(label)); }, [label]);
  const toggleMember = (nid) => { const next = new Set(memberIds); if (next.has(nid)) next.delete(nid); else next.add(nid); setMemberIds(next); };
  const submit = () => {
    if (!label.trim()) return alert("Dai un nome alla sotto-nebulosa.");
    let finalId = id.trim() || slugify(label);
    if (data.nodes.some(n => n.id === finalId)) finalId = finalId + "_" + Math.random().toString(36).slice(2,5);
    const headNode = { id: finalId, type: "cluster", category, label: label.trim(), size: Number(size) || 2.0, description: description.trim() || undefined, isClusterHead: true };
    onSave({ kind: "create_cluster", head: headNode, members: [...memberIds], linkToHub, linkType });
  };
  return (
    <div className="panel editor cluster-editor">
      <div className="editor-head">
        <div className="editor-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{verticalAlign:"middle", marginRight:6}}><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9" strokeDasharray="2 3"/></svg>
          Nuova sotto-nebulosa
        </div>
        <button className="x-btn" onClick={onClose}>✕</button>
      </div>
      <p className="editor-blurb">Una sotto-nebulosa è un nodo "head" attorno a cui altri nodi orbitano. Scegli il nome, opzionalmente collegala all'HUB, e seleziona quali nodi esistenti vivranno al suo interno.</p>
      <div className="form">
        <label>Nome<input value={label} onChange={e => setLabel(e.target.value)} placeholder="Es. Marketing, Photo, Tech…"/></label>
        <label>ID <span className="hint-inline">(automatico)</span><input value={id} onChange={e => setId(slugify(e.target.value))} placeholder="es. marketing"/></label>
        <label>Categoria / colore<select value={category} onChange={e => setCategory(e.target.value)}>{Object.entries(data.categories).filter(([k]) => k !== "hub").map(([k, c]) => <option key={k} value={k}>{c.label}</option>)}</select></label>
        <label>Dimensione head · {Number(size).toFixed(1)}<input type="range" min="1.5" max="3" step="0.1" value={size} onChange={e => setSize(e.target.value)}/></label>
        <label>Descrizione (opzionale)<textarea rows="2" value={description} onChange={e => setDescription(e.target.value)} placeholder="Cosa raggruppa questa sotto-nebulosa?"/></label>
        <label className="check-label"><input type="checkbox" checked={linkToHub} onChange={e => setLinkToHub(e.target.checked)}/><span>Collega l'head all'HUB CENTRALE</span></label>
        {linkToHub && <label>Tipo collegamento all'HUB<select value={linkType} onChange={e => setLinkType(e.target.value)}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select></label>}
        <div className="connect-block">
          <div className="connect-title">Sposta nodi esistenti dentro · {memberIds.size} selezionati</div>
          <div className="connect-grid">{data.nodes.filter(n => n.id !== "hub" && !n.isClusterHead).map(n => <div key={n.id} className={`chip ${memberIds.has(n.id) ? "on" : ""}`} onClick={() => toggleMember(n.id)} style={{borderColor: memberIds.has(n.id) ? data.categories[n.category].color : undefined}}><span className="dot" style={{background: data.categories[n.category].color}}/>{n.label}{n.cluster && <span className="chip-tag">in {data.nodes.find(x => x.id === n.cluster)?.label || "?"}</span>}</div>)}</div>
        </div>
        <div className="form-actions">
          <button className="act-btn" onClick={onClose}>Annulla</button>
          <button className="act-btn primary" onClick={submit}>Crea sotto-nebulosa</button>
        </div>
      </div>
    </div>
  );
}

window.ClusterCreator = ClusterCreator;
</script>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// Template starter per nuovi utenti
const STARTER_NEBULA = {
  categories: {...window.NEURAL_DATA_DEFAULT.categories},
  linkTypes:  {...window.NEURAL_DATA_DEFAULT.linkTypes},
  nodes: [
    { id:"hub",             type:"hub",     category:"hub",      label:"HUB CENTRALE",   size:3.0, description:"Il tuo sistema operativo personale. Esplora il grafo 3D e costruisci il tuo ecosistema." },
    { id:"come_iniziare",   type:"website", category:"future",   label:"Come iniziare",  size:1.8, description:"➊ Clicca un nodo per vedere i dettagli\n➋ '+ Aggiungi nodo' per creare un pianeta\n➌ 'Sotto-nebulosa' per creare una galassia\n➍ Trascina i nodi per riorganizzare\n➎ Doppio-click per aprire l'URL" },
    { id:"starter_proj",    type:"website", category:"business", label:"Es. Progetto",   size:1.7, description:"Un nodo business. Aggiungici URL, descrizione e task da completare." },
    { id:"starter_tool",    type:"tool",    category:"ops",      label:"Es. Tool",       size:1.5, description:"Un nodo per strumenti come Notion, Figma, Slack. Aggiungi l'URL dello strumento." },
    { id:"starter_sistema", type:"website", category:"startup",  label:"Es. Sistema",    size:2.0, isClusterHead:true, description:"Un sistema raggruppa pianeti collegati. Clicca '+ Pianeta' per aggiungerne altri." }
  ],
  links: [
    { source:"hub", target:"come_iniziare",   type:"core" },
    { source:"hub", target:"starter_proj",    type:"core" },
    { source:"hub", target:"starter_tool",    type:"uses" },
    { source:"hub", target:"starter_sistema", type:"core" }
  ]
};

function LoginScreen({ error }) {
  const [email, setEmail] = React.useState('');
  const [status, setStatus] = React.useState(null);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setStatus('sending');
    const { error: err } = await window.signInWithMagicLink(email.trim().toLowerCase());
    if (err) setStatus({ error: err });
    else setStatus('sent');
  };

  return (
    <div className="login-screen">
      <div className="login-box">
        <div className="login-title">NEURAL OS</div>
        <div className="login-sub">Sistema operativo personale · 3D</div>
        {error && <div className="login-err" style={{marginBottom:'1rem'}}>{error}</div>}
        {status === 'sent' ? (
          <div className="login-sent">
            ✉ Link inviato a <strong>{email}</strong><br/>
            Controlla la tua email e clicca il link per accedere.
          </div>
        ) : (
          <form onSubmit={handleSubmit}>
            <input className="login-input" type="email" value={email}
              onChange={e => setEmail(e.target.value)}
              placeholder="la tua email" required autoFocus/>
            <button className="login-btn" type="submit" disabled={status === 'sending'}>
              {status === 'sending' ? 'Invio in corso...' : '→ Accedi con Magic Link'}
            </button>
            {status?.error && <div className="login-err">{status.error}</div>}
          </form>
        )}
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(undefined); // undefined=loading, null=unauthed, object=authed
  const [authError, setAuthError] = useState(null);
  const [viewingAs, setViewingAs] = useState(null); // admin: può visualizzare nebule altrui
  const [teamMembers, setTeamMembers] = useState([]);
  const [data, setData] = useState(() => JSON.parse(JSON.stringify(window.NEURAL_DATA_DEFAULT)));
  const [selectedId, setSelectedId] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);
  const [activeCats, setActiveCats] = useState(() => new Set(["all", ...Object.keys(window.NEURAL_DATA_DEFAULT.categories)]));
  const [activeClusters, setActiveClusters] = useState(() => new Set(["all"]));
  const [searchQuery, setSearchQuery] = useState("");
  const [focusMode, setFocusMode] = useState(false);
  const [hintVisible, setHintVisible] = useState(true);
  const [editorOpen, setEditorOpen] = useState(false);
  const [editingNode, setEditingNode] = useState(null);
  const [clusterCreatorOpen, setClusterCreatorOpen] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const containerRef = useRef(null);
  const graphRef = useRef(null);
  const cloudLoaded = useRef(false);
  const readOnly = useRef(false); // true quando admin visualizza nebula altrui

  // ---- Auth init ----
  useEffect(() => {
    let cancelled = false;
    let sessionSet = false; // evita doppia chiamata setViewingAs
    const fallback = setTimeout(() => { if (!cancelled && !sessionSet) setUser(null); }, 8000);

    const applySession = async (sb, session) => {
      if (cancelled) return;
      const u = session?.user || null;
      if (!u) {
        // Non chiamare subito setUser(null): onAuthStateChange potrebbe ancora portare una sessione
        // (getSession può rispondere null mentre la sessione viene ripristinata da localStorage)
        // Usiamo solo il fallback per il caso veramente non autenticato
        return;
      }
      clearTimeout(fallback);
      if (sessionSet) return; // già loggato, evita doppia inizializzazione
      // Whitelist check
      try {
        const { data: agent } = await sb.from('agenti').select('id').eq('email', u.email).eq('active', true).maybeSingle();
        if (!agent) {
          await sb.auth.signOut();
          setAuthError('Email non autorizzata per Neural OS.');
          setUser(null); return;
        }
      } catch(e) { /* agenti non raggiungibile: accesso comunque */ }
      if (cancelled || sessionSet) return;
      sessionSet = true;
      window._nebulaUserEmail = u.email;
      setUser(u);
      setViewingAs(u.email);
      if (u.email === ADMIN_EMAIL) {
        try {
          const { data: agents } = await sb.from('agenti').select('name, email').eq('active', true).order('name');
          if (!cancelled) setTeamMembers(agents || []);
        } catch(e) {}
      }
    };

    window._initSupabase().then(sb => {
      if (!sb || cancelled) { clearTimeout(fallback); setUser(null); return; }
      // onAuthStateChange: gestisce magic link redirect E ripristino sessione da localStorage
      sb.auth.onAuthStateChange((event, session) => {
        if (cancelled) return;
        if (event === 'SIGNED_OUT') { sessionSet = false; setUser(null); return; }
        applySession(sb, session);
      });
      // getSession: controlla sessione in memoria (potrebbe arrivare prima o dopo onAuthStateChange)
      sb.auth.getSession()
        .then(({ data: { session } }) => applySession(sb, session))
        .catch(() => { if (!cancelled && !sessionSet) { clearTimeout(fallback); setUser(null); } });
    }).catch(() => { clearTimeout(fallback); if (!cancelled) setUser(null); });

    return () => { cancelled = true; clearTimeout(fallback); };
  }, []);

  // ---- Carica dati al cambio di viewingAs ----
  useEffect(() => {
    if (!viewingAs) return;
    cloudLoaded.current = false;
    readOnly.current = viewingAs !== window._nebulaUserEmail;
    // Prova localStorage solo per propri dati
    if (!readOnly.current) {
      try {
        const raw = localStorage.getItem(STORAGE_PREFIX + viewingAs);
        if (raw) {
          const p = JSON.parse(raw);
          setData({ categories:{...window.NEURAL_DATA_DEFAULT.categories,...(p.categories||{})}, linkTypes:{...window.NEURAL_DATA_DEFAULT.linkTypes,...(p.linkTypes||{})}, nodes:p.nodes||window.NEURAL_DATA_DEFAULT.nodes, links:p.links||window.NEURAL_DATA_DEFAULT.links });
        }
      } catch(e) {}
    }
    window.loadFromCloud(viewingAs).then(cloudData => {
      if (cloudData) {
        const merged = { categories:{...window.NEURAL_DATA_DEFAULT.categories,...(cloudData.categories||{})}, linkTypes:{...window.NEURAL_DATA_DEFAULT.linkTypes,...(cloudData.linkTypes||{})}, nodes:cloudData.nodes||window.NEURAL_DATA_DEFAULT.nodes, links:cloudData.links||window.NEURAL_DATA_DEFAULT.links };
        setData(merged);
        if (!readOnly.current) try { localStorage.setItem(STORAGE_PREFIX + viewingAs, JSON.stringify(merged)); } catch(e) {}
      } else {
        // Nessun dato cloud: sempre STARTER_NEBULA (5 nodi guida), mai i dati di default
        setData(JSON.parse(JSON.stringify(STARTER_NEBULA)));
      }
      cloudLoaded.current = true;
    }).catch(() => { cloudLoaded.current = true; });
  }, [viewingAs]);

  // Salva posizione e pin state di un nodo nella nebula (persiste su reload)
  const handlePositionSave = useCallback((nodeId, x, y, z, pinned) => {
    setData(prev => {
      const nodes = prev.nodes.map(n => n.id === nodeId
        ? { ...n, _px: x, _py: y, _pz: z, _pinned: pinned }
        : n);
      const updated = { ...prev, nodes };
      window.saveNeuralData(updated);
      return updated;
    });
  }, []);

  // Init 3D scene — scatta quando user diventa autenticato (container è nel DOM)
  useEffect(() => {
    if (!user || graphRef.current || !containerRef.current) return;
    const g = window.NeuralGraph3D.init({
      container: containerRef.current,
      onSelect: (id) => { setSelectedId(id); if (id) setHintVisible(false); },
      onHover: (id) => setHoveredId(id),
      onPositionSave: handlePositionSave
    });
    graphRef.current = g;
    return () => { g.dispose(); graphRef.current = null; };
  }, [user]);

  // sync data → graph + salva (non in readOnly)
  useEffect(() => {
    if (graphRef.current) graphRef.current.setData(data);
    if (!readOnly.current && window._nebulaUserEmail) {
      try { localStorage.setItem(STORAGE_PREFIX + window._nebulaUserEmail, JSON.stringify(data)); } catch(e) {}
      if (cloudLoaded.current) window.saveToCloud(data);
    }
  }, [data]);

  // sync filters
  useEffect(() => {
    graphRef.current?.setFilters(activeCats, searchQuery, activeClusters);
  }, [activeCats, searchQuery, activeClusters]);
  useEffect(() => { graphRef.current?.setSelected(selectedId); }, [selectedId]);
  useEffect(() => { graphRef.current?.setFocusMode(focusMode); }, [focusMode]);

  const totals = useMemo(() => {
    const byCat = {};
    for (const n of data.nodes) byCat[n.category] = (byCat[n.category] || 0) + 1;
    return { nodes: data.nodes.length, links: data.links.length, byCat };
  }, [data]);

  const selectedNode = selectedId ? data.nodes.find(n => n.id === selectedId) : null;

  const focusNode = useCallback((id) => {
    setSelectedId(id);
    setHintVisible(false);
    setTimeout(() => graphRef.current?.focusNode(id), 30);
  }, []);

  // ESC
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") {
        if (editorOpen) { setEditorOpen(false); setEditingNode(null); }
        else if (clusterCreatorOpen) { setClusterCreatorOpen(false); }
        else { setSelectedId(null); setFocusMode(false); }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [editorOpen, clusterCreatorOpen]);

  const handleSave = (payload) => {
    // createdId calcolato FUORI dall'updater per evitare problemi di batching React
    const createdId = payload.kind === "create_node" ? payload.node.id
                    : payload.kind === "create_cluster" ? payload.head.id
                    : null;
    setData(prev => {
      const next = { ...prev, nodes: [...prev.nodes], links: [...prev.links] };
      if (payload.kind === "create_node") {
        next.nodes.push(payload.node);
        for (const l of payload.newLinks) next.links.push(l);
      } else if (payload.kind === "edit_node") {
        // sostituisci nodo
        next.nodes = next.nodes.map(n => n.id === payload.originalId ? { ...n, ...payload.node } : n);
        // link patches — usa source__target come chiave stabile (non più indice numerico)
        next.links = next.links
          .filter(l => {
            const k1 = `${l.source}__${l.target}`, k2 = `${l.target}__${l.source}`;
            return payload.linkPatches[k1] !== "removed" && payload.linkPatches[k2] !== "removed";
          })
          .map(l => {
            const k1 = `${l.source}__${l.target}`, k2 = `${l.target}__${l.source}`;
            const patch = payload.linkPatches[k1] || payload.linkPatches[k2];
            return (patch && patch.type) ? { ...l, type: patch.type } : l;
          });
        // aggiungi nuovi
        for (const l of (payload.addLinks || [])) {
          const exists = next.links.some(x => (x.source===l.source && x.target===l.target) || (x.source===l.target && x.target===l.source));
          if (!exists) next.links.push(l);
        }
      } else if (payload.kind === "link") {
        const exists = next.links.some(x => (x.source===payload.link.source && x.target===payload.link.target) || (x.source===payload.link.target && x.target===payload.link.source));
        if (!exists) next.links.push(payload.link);
      } else if (payload.kind === "create_cluster") {
        // 1) push head
        next.nodes.push(payload.head);
        // 2) sposta members dentro il cluster
        next.nodes = next.nodes.map(n => payload.members.includes(n.id) ? { ...n, cluster: payload.head.id } : n);
        // 3) crea link head ↔ hub se richiesto
        if (payload.linkToHub) {
          const exists = next.links.some(x => (x.source==="hub" && x.target===payload.head.id) || (x.source===payload.head.id && x.target==="hub"));
          if (!exists) next.links.push({ source: "hub", target: payload.head.id, type: payload.linkType });
        }
        // 4) crea link head ↔ ogni membro (se non esiste)
        for (const mid of payload.members) {
          const exists = next.links.some(x => (x.source===payload.head.id && x.target===mid) || (x.source===mid && x.target===payload.head.id));
          if (!exists) next.links.push({ source: payload.head.id, target: mid, type: "uses" });
        }
      }
      return next;
    });
    // Chiude tutti i pannelli di creazione
    setEditorOpen(false);
    setEditingNode(null);
    setClusterCreatorOpen(false);
    // Seleziona e centra il nodo appena creato
    if (createdId) {
      setSelectedId(createdId);
      setHintVisible(false);
      setTimeout(() => graphRef.current?.focusNode(createdId), 150);
    }
  };

  const handleSaveTask = (nodeId, tasks) => {
    setData(prev => {
      const updated = { ...prev, nodes: prev.nodes.map(n => n.id === nodeId ? { ...n, tasks } : n) };
      window.saveNeuralData(updated);
      return updated;
    });
  };

  const handleGetPinned = useCallback((nodeId) => graphRef.current?.isNodePinned(nodeId) || false, []);
  const handleTogglePin = useCallback((nodeId) => graphRef.current?.toggleNodePinned(nodeId) || false, []);

  const handleSaveUrl = (nodeId, newUrl) => {
    setData(prev => {
      const updated = { ...prev, nodes: prev.nodes.map(n => n.id === nodeId ? { ...n, url: newUrl.trim() || undefined } : n) };
      window.saveNeuralData(updated);
      return updated;
    });
  };

  const handleDelete = (node) => {
    if (node.id === "hub") return;
    if (!confirm(`Eliminare il nodo "${node.label}" e tutte le sue connessioni?`)) return;
    setData(prev => ({
      ...prev,
      nodes: prev.nodes.filter(n => n.id !== node.id),
      links: prev.links.filter(l => l.source !== node.id && l.target !== node.id)
    }));
    setSelectedId(null);
  };

  const onResetData = () => {
    if (!confirm("Ripristinare i dati di default? Tutte le modifiche personalizzate andranno perse.")) return;
    setData(window.resetNeuralData());
    setSelectedId(null);
  };

  // ---- Auth guards ----
  if (user === undefined) return (
    <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:'var(--dim)',letterSpacing:'.06em'}}>NEURAL OS ·&nbsp;<span style={{animation:'pulse 1.2s infinite'}}>●</span></span>
    </div>
  );
  if (!user) return <LoginScreen error={authError} />;

  // Sola lettura quando admin visualizza nebula di un altro utente
  const isReadOnly = !!(viewingAs && viewingAs !== user.email);

  const isAdminView = viewingAs && viewingAs !== user.email;

  return (
    <div className="stage">
      <div id="three-container" ref={containerRef}/>
      <div className="vignette"/>

      {sidebarOpen && <div className="sidebar-backdrop" onClick={() => setSidebarOpen(false)}/>}
      <Sidebar
        data={data}
        activeCats={activeCats}
        setActiveCats={setActiveCats}
        activeClusters={activeClusters}
        setActiveClusters={setActiveClusters}
        searchQuery={searchQuery}
        setSearchQuery={setSearchQuery}
        totals={totals}
        focusNode={(id) => { focusNode(id); setSidebarOpen(false); }}
        openEditor={() => { setEditingNode(null); setEditorOpen(true); setClusterCreatorOpen(false); setSidebarOpen(false); }}
        openClusterEditor={() => { setClusterCreatorOpen(true); setEditorOpen(false); setEditingNode(null); setSidebarOpen(false); }}
        isOpen={sidebarOpen}
        readOnly={isReadOnly}
      />

      <TopBar
        totals={totals}
        focusMode={focusMode}
        setFocusMode={setFocusMode}
        selectedId={selectedId}
        onCenter={() => graphRef.current?.focusNode("hub")}
        onToggleSidebar={() => setSidebarOpen(v => !v)}
        userEmail={user.email}
        isReadOnly={isReadOnly}
        teamMembers={user.email === ADMIN_EMAIL ? teamMembers : []}
        viewingAs={viewingAs}
        onSwitchView={email => { cloudLoaded.current = false; readOnly.current = email !== user.email; setViewingAs(email); }}
        onLogout={() => { window.nebulaSignOut(); setUser(null); setViewingAs(null); graphRef.current?.dispose(); graphRef.current = null; }}
      />

      {!editorOpen && !clusterCreatorOpen && selectedNode && (
        <NodePanel
          data={data}
          node={selectedNode}
          onClose={() => { setSelectedId(null); setFocusMode(false); }}
          focusNode={focusNode}
          setFocusMode={setFocusMode}
          focusMode={focusMode}
          onEdit={(node) => { setEditingNode(node); setEditorOpen(true); }}
          onDelete={handleDelete}
          onSaveUrl={handleSaveUrl}
          onCreateConnected={() => { setEditingNode(null); setEditorOpen(true); }}
          onSaveTask={handleSaveTask}
          readOnly={isReadOnly}
          onGetPinned={() => handleGetPinned(selectedId)}
          onTogglePin={() => handleTogglePin(selectedId)}
        />
      )}

      {editorOpen && (
        <EditorPanel
          data={data}
          editingNode={editingNode}
          defaultConnect={selectedId}
          defaultCluster={editingNode ? undefined : (selectedNode?.isClusterHead ? selectedNode.id : selectedNode?.cluster || undefined)}
          onClose={() => { setEditorOpen(false); setEditingNode(null); }}
          onSave={handleSave}
        />
      )}

      {clusterCreatorOpen && (
        <ClusterCreator
          data={data}
          onClose={() => setClusterCreatorOpen(false)}
          onSave={handleSave}
        />
      )}

      {!selectedNode && !editorOpen && !clusterCreatorOpen && (
        <div className={`hint-card ${hintVisible ? "" : "hidden"}`} onClick={() => setHintVisible(false)}>
          <div><span className="hk">L-click + drag</span> sposta i pianeti</div>
          <div><span className="hk">Rotella premuta + drag</span> ruota la visuale</div>
          <div><span className="hk">R-click + drag</span> pan libero</div>
          <div><span className="hk">Scroll</span> zoom verso cursore</div>
          <div><span className="hk">Click</span> nodo per dettagli · <span className="hk">Doppio click</span> per URL</div>
          <div className="hint-card-close">✕ Tocca per chiudere</div>
        </div>
      )}

      <div className="status">
        <span className="dot" style={{background:"#34D399", boxShadow:"0 0 8px #34D399"}}/>
        <span>{totals.nodes} nodi · {totals.links} sinapsi attive</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
