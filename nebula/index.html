<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neural OS — 3D Mappa Ecosistema</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #050610;
    --fg: #e6ebf5;
    --dim: #8a93a8;
    --dim-2: #5a6378;
    --line: rgba(255,255,255,0.08);
    --line-2: rgba(255,255,255,0.14);
    --glass: rgba(12,16,28,0.62);
    --accent: #8B5CF6;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background: var(--bg); color: var(--fg); font-family: "Inter", system-ui, sans-serif; overflow:hidden; -webkit-font-smoothing: antialiased; }
  #root { position: fixed; inset: 0; }
  #three-container { position: absolute; inset: 0; z-index: 1; }
  #three-container canvas { display: block; cursor: grab; }
  #three-container canvas:active { cursor: grabbing; }

  .panel {
    background: linear-gradient(180deg, rgba(20,24,40,0.78), rgba(10,12,22,0.84));
    backdrop-filter: blur(14px) saturate(1.2);
    -webkit-backdrop-filter: blur(14px) saturate(1.2);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .sidebar {
    position: absolute; left: 18px; top: 18px; bottom: 18px;
    width: 280px; padding: 18px; z-index: 5;
    display: flex; flex-direction: column; gap: 14px;
    overflow: hidden;
  }
  .brand { display:flex; align-items:center; gap:12px; }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 10px; position: relative;
    background: radial-gradient(circle at 30% 30%, #fff, #8B5CF6 60%, #1b1140 100%);
    box-shadow: 0 0 18px rgba(139,92,246,0.55), inset 0 0 8px rgba(255,255,255,0.4);
  }
  .brand-mark span { position:absolute; inset: 6px; border-radius: 6px; background: radial-gradient(circle, rgba(255,255,255,0.85), transparent 60%); }
  .brand-title { font-family: "JetBrains Mono", monospace; font-size: 14px; letter-spacing: 0.18em; font-weight: 600; }
  .brand-sub { font-size: 11px; color: var(--dim); letter-spacing: 0.04em; }

  .counts { display: flex; flex-direction: column; gap: 2px; padding-top: 12px; border-top: 1px solid var(--line); max-height: 290px; overflow-y: auto; }
  .counts::-webkit-scrollbar { width: 4px; }
  .counts::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }
  .count-row {
    display: grid; grid-template-columns: 14px 1fr auto; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: 8px; cursor: pointer;
    font-size: 12.5px; transition: background 0.15s, opacity 0.15s;
  }
  .count-row:hover { background: rgba(255,255,255,0.04); }
  .count-row.off { opacity: 0.4; }
  .hide-all-btn { flex-shrink:0; width:22px; height:22px; border-radius:6px; background:transparent; border:1px solid var(--line); color:var(--dim); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; transition:all .15s; margin-left:4px; }
  .hide-all-btn:hover { background:rgba(255,80,80,0.12); border-color:rgba(255,80,80,0.4); color:#f87171; }
  .nebula-filters { display:flex; flex-direction:column; gap:2px; padding-top:10px; border-top:1px solid var(--line); }
  .nebula-row { display:grid; grid-template-columns:14px 1fr auto; align-items:center; gap:10px; padding:5px 8px; border-radius:8px; cursor:pointer; font-size:12px; transition:background .15s,opacity .15s; }
  .nebula-row:hover { background:rgba(255,255,255,0.04); }
  .nebula-row.off { opacity:0.35; }
  .nebula-title { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--dim); letter-spacing:.18em; padding:6px 8px 2px; text-transform:uppercase; }
  .count-row.main { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
  .count-row .num { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--dim); }
  .dot { width: 10px; height: 10px; border-radius: 50%; display:inline-block; }

  .search { position: relative; }
  .search input {
    width: 100%; padding: 10px 32px 10px 12px;
    background: rgba(0,0,0,0.35); border: 1px solid var(--line);
    border-radius: 9px; color: var(--fg); font-size: 13px; font-family: inherit; outline: none;
  }
  .search input::placeholder { color: var(--dim-2); }
  .search input:focus { border-color: rgba(139,92,246,0.5); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
  .search svg { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--dim); }

  .dual-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .big-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 8px; border-radius: 9px; cursor: pointer;
    background: rgba(139,92,246,0.16); border: 1px solid rgba(139,92,246,0.42);
    color: #ddd6fe; font-family: inherit; font-size: 12px; font-weight: 500;
    transition: all 0.15s;
  }
  .big-btn:hover { background: rgba(139,92,246,0.26); border-color: rgba(139,92,246,0.6); }
  .big-btn.cluster { background: rgba(244,114,182,0.14); border-color: rgba(244,114,182,0.4); color: #fbcfe8; }
  .big-btn.cluster:hover { background: rgba(244,114,182,0.24); border-color: rgba(244,114,182,0.6); }

  /* Cluster editor */
  .cluster-editor .editor-blurb { margin: 0; padding: 10px 12px; border-radius: 9px; background: rgba(244,114,182,0.08); border: 1px solid rgba(244,114,182,0.25); font-size: 12px; line-height: 1.55; color: rgba(230,235,245,0.78); }
  .check-label { flex-direction: row !important; align-items: center; gap: 8px !important; cursor: pointer; color: var(--fg) !important; font-size: 13px !important; font-family: inherit !important; letter-spacing: 0 !important; text-transform: none !important; }
  .check-label input { width: 16px; height: 16px; accent-color: #F472B6; cursor: pointer; }
  .chip-tag { font-family: "JetBrains Mono", monospace; font-size: 9.5px; color: var(--dim); margin-left: 6px; padding: 1px 5px; border-radius: 4px; background: rgba(0,0,0,0.3); }

  .quick-list { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; padding-top: 10px; border-top: 1px solid var(--line); }
  .quick-list::-webkit-scrollbar { width: 4px; }
  .quick-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }
  .quick-title { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--dim); letter-spacing: 0.18em; padding: 4px 8px; }
  .quick-item {
    display: grid; grid-template-columns: 14px 1fr; gap: 10px; align-items: center;
    padding: 7px 8px; border-radius: 8px; cursor: pointer; font-size: 12.5px;
  }
  .quick-item:hover { background: rgba(255,255,255,0.04); }
  .qlabel { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .topbar {
    position: absolute; left: 50%; top: 18px; transform: translateX(-50%);
    z-index: 5; display: flex; align-items: center; gap: 20px;
    padding: 9px 16px; border-radius: 12px;
    background: var(--glass); backdrop-filter: blur(14px); border: 1px solid var(--line);
    font-size: 12px;
  }
  .tb-left, .tb-right, .tb-mid { display:flex; align-items:center; gap: 10px; }
  .tb-left .kbd-mono { font-family: "JetBrains Mono", monospace; letter-spacing: 0.18em; font-weight: 600; }
  .dim { color: var(--dim); }
  .tb-mid { color: var(--dim); font-family: "JetBrains Mono", monospace; }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #34D399; box-shadow: 0 0 10px #34D399; animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .tb-btn {
    background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    color: var(--fg); padding: 6px 12px; border-radius: 8px;
    font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.15s;
  }
  .tb-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .tb-btn:not(:disabled):hover { background: rgba(255,255,255,0.08); border-color: var(--line-2); }
  .tb-btn.on { background: rgba(139,92,246,0.18); border-color: rgba(139,92,246,0.5); color: #C4B5FD; }
  .hint { color: var(--dim); font-family: "JetBrains Mono", monospace; font-size: 11px; }

  .detail {
    position: absolute; right: 18px; top: 18px; width: 360px; max-height: calc(100vh - 36px);
    z-index: 5; padding: 20px; display: flex; flex-direction: column; gap: 14px;
    overflow-y: auto;
    animation: slideIn 0.25s ease-out;
  }
  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }
  @keyframes slideIn { from{transform: translateX(20px); opacity:0;} to{transform: none; opacity:1;} }
  .detail-head { display: flex; justify-content: space-between; align-items: center; }
  .detail-cat { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.16em; padding: 4px 10px; border: 1px solid; border-radius: 999px; }
  .x-btn { width: 28px; height: 28px; border-radius: 8px; background: transparent; border: 1px solid var(--line); color: var(--dim); cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .x-btn:hover { background: rgba(255,255,255,0.06); color: var(--fg); }
  .detail-title-row { display: flex; align-items: center; gap: 12px; }
  .detail-title-row h2 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .node-orb { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid; box-shadow: 0 0 14px currentColor; flex-shrink: 0; }
  .detail-id { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--dim); }
  .detail-id span { color: var(--fg); }
  .detail-desc { margin: 0; font-size: 13px; line-height: 1.55; color: rgba(230,235,245,0.82); }
  .detail-url { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 14px; border-radius: 9px; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.3); color: #C4B5FD; text-decoration: none; font-family: "JetBrains Mono", monospace; font-size: 12px; transition: all 0.15s; flex: 1; min-width: 0; }
  .detail-url:hover { background: rgba(139,92,246,0.18); border-color: rgba(139,92,246,0.5); }
  .detail-url span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .url-row { display: flex; align-items: center; gap: 6px; }
  .url-edit-btn { flex-shrink: 0; width: 28px; height: 28px; border-radius: 7px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: var(--dim); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .url-edit-btn:hover { background: rgba(139,92,246,0.15); border-color: rgba(139,92,246,0.4); color: #C4B5FD; }
  .url-input-row { display: flex; gap: 6px; align-items: center; }
  .url-input { flex: 1; background: rgba(0,0,0,0.35); border: 1px solid rgba(139,92,246,0.4); border-radius: 9px; color: #C4B5FD; padding: 9px 12px; font-family: "JetBrains Mono", monospace; font-size: 12px; outline: none; transition: border-color 0.15s; }
  .url-input:focus { border-color: rgba(139,92,246,0.7); box-shadow: 0 0 0 2px rgba(139,92,246,0.15); }
  .url-input::placeholder { color: var(--dim-2); }
  .url-confirm-btn { flex-shrink: 0; padding: 8px 12px; border-radius: 8px; background: rgba(139,92,246,0.2); border: 1px solid rgba(139,92,246,0.4); color: #C4B5FD; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .url-confirm-btn:hover { background: rgba(139,92,246,0.35); }
  .url-cancel-btn { flex-shrink: 0; padding: 8px 10px; border-radius: 8px; background: transparent; border: 1px solid var(--line); color: var(--dim); cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .url-cancel-btn:hover { border-color: rgba(255,80,80,0.4); color: #f87171; }
  /* ---- TASKS ---- */
  .task-section { border-top:1px solid var(--line); padding-top:12px; }
  .task-section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .task-section-title { font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); }
  .task-wip-badge { font-family:"JetBrains Mono",monospace; font-size:9px; color:#FDE047; letter-spacing:.06em; animation:badge-pulse 1.4s ease-in-out infinite; }
  .task-input-row { display:flex; gap:6px; margin-bottom:8px; }
  .task-input { flex:1; background:rgba(0,0,0,0.35); border:1px solid var(--line); border-radius:8px; color:var(--fg); padding:7px 10px; font-family:"JetBrains Mono",monospace; font-size:11px; outline:none; transition:border-color .15s; }
  .task-input:focus { border-color:rgba(139,92,246,0.5); }
  .task-input::placeholder { color:var(--dim-2); }
  .task-add-btn { flex-shrink:0; padding:7px 12px; border-radius:8px; background:rgba(139,92,246,0.15); border:1px solid rgba(139,92,246,0.4); color:#C4B5FD; cursor:pointer; font-size:14px; font-weight:600; transition:all .15s; }
  .task-add-btn:hover { background:rgba(139,92,246,0.28); }
  .task-row { display:flex; align-items:center; gap:5px; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
  .task-text { flex:1; font-size:12px; line-height:1.4; color:var(--fg); word-break:break-word; }
  .task-text.wip { color:#FDE047; font-weight:500; }
  .task-wip-btn { flex-shrink:0; width:26px; height:26px; border-radius:6px; background:transparent; border:1px solid rgba(253,224,71,0.25); color:rgba(253,224,71,0.6); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .task-wip-btn:hover, .task-wip-btn.active { background:rgba(253,224,71,0.15); border-color:rgba(253,224,71,0.6); color:#FDE047; }
  .task-done-btn { flex-shrink:0; width:26px; height:26px; border-radius:6px; background:transparent; border:1px solid rgba(52,211,153,0.25); color:rgba(52,211,153,0.6); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .task-done-btn:hover { background:rgba(52,211,153,0.15); border-color:rgba(52,211,153,0.5); color:#34D399; }
  .task-done-toggle { cursor:pointer; font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--dim); padding:4px 0; user-select:none; transition:color .15s; }
  .task-done-toggle:hover { color:var(--fg); }
  .task-done-row { display:flex; align-items:center; gap:5px; padding:3px 0; opacity:.45; }
  .task-done-text { flex:1; font-size:11px; text-decoration:line-through; color:var(--dim); }
  .task-restore-btn { background:transparent; border:none; color:var(--dim); cursor:pointer; font-size:11px; padding:2px 4px; transition:color .15s; }
  .task-restore-btn:hover { color:var(--fg); }
  .new-planet-btn { display:flex; align-items:center; gap:5px; background:rgba(52,211,153,0.1); border-color:rgba(52,211,153,0.35); color:#6EE7B7; }
  .new-planet-btn:hover { background:rgba(52,211,153,0.2); border-color:rgba(52,211,153,0.6); }
  .tb-menu-btn { display:none; background:transparent; border:1px solid var(--line); color:var(--dim); padding:6px 8px; border-radius:8px; cursor:pointer; transition:all .15s; align-items:center; }
  .tb-menu-btn:hover { background:rgba(255,255,255,0.07); color:var(--fg); }
  .sidebar-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:15; }

  @media (max-width: 700px) {
    /* Sidebar: drawer da sinistra */
    .sidebar {
      top:0; left:0; bottom:0; width:82vw; max-width:300px; border-radius:0;
      transform:translateX(-105%); transition:transform .28s cubic-bezier(.4,0,.2,1);
      z-index:20; padding-top:68px;
    }
    .sidebar.open { transform:translateX(0); }
    .sidebar-backdrop { display:block; }
    /* Topbar: barra piena in alto */
    .topbar {
      left:0; right:0; top:0; width:100%; transform:none;
      border-radius:0; padding:10px 14px;
      justify-content:space-between;
    }
    .tb-menu-btn { display:flex; }
    .tb-hide-sm { display:none !important; }
    /* Detail panel: bottom sheet */
    .detail {
      right:0; left:0; top:auto; bottom:0; width:100%;
      max-height:78vh; border-radius:16px 16px 0 0;
      animation:slideUp .22s ease-out;
    }
    @keyframes slideUp { from{transform:translateY(28px);opacity:0} to{transform:none;opacity:1} }
    /* Editor / Cluster: full screen overlay */
    .editor {
      right:0; left:0; top:0; bottom:0; width:100%;
      max-height:100dvh; border-radius:0; z-index:10;
    }
    /* Hint card: in alto a destra */
    .hint-card { bottom:auto; top:68px; right:10px; font-size:10.5px; padding:10px 12px; }
    /* Status: sopra la bottom bar */
    .status { bottom:12px; }
    /* Topbar title */
    .tb-left .kbd-mono { font-size:12px; letter-spacing:.12em; }
    /* Action buttons più alti per touch */
    .act-btn { padding:11px 8px; }
    .big-btn { padding:12px 8px; }
  }
  .quick-link-form { display: flex; flex-direction: column; gap: 6px; padding: 10px 12px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--line-2); margin-top: 2px; }
  .quick-link-label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: .14em; color: var(--dim); text-transform: uppercase; }
  .quick-link-selects { display: flex; gap: 6px; }
  .quick-link-selects select { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--line); color: var(--fg); padding: 7px 8px; border-radius: 7px; font-size: 11px; font-family: "JetBrains Mono", monospace; outline: none; cursor: pointer; }
  .quick-link-selects select:focus { border-color: rgba(139,92,246,0.5); }
  .quick-link-actions { display: flex; gap: 6px; }
  .quick-link-actions .url-confirm-btn { flex: 1; font-size: 12px; }
  .quick-link-actions .url-cancel-btn { font-size: 12px; }
  .detail-actions { display: flex; gap: 8px; }
  .act-btn { flex: 1; padding: 9px; border-radius: 9px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: var(--fg); cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.15s; }
  .act-btn:hover { background: rgba(255,255,255,0.08); }
  .act-btn.primary { background: rgba(139,92,246,0.15); border-color: rgba(139,92,246,0.4); color: #ddd6fe; }
  .act-btn.primary:hover { background: rgba(139,92,246,0.25); }

  .danger-btn { padding: 9px; border-radius: 9px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.15s; }
  .danger-btn:hover { background: rgba(239,68,68,0.18); }
  .pin-btn { padding: 7px 10px; border-radius: 9px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: var(--dim); cursor: pointer; font-family: inherit; font-size: 11px; transition: all 0.15s; display:flex; align-items:center; gap:5px; }
  .pin-btn:hover { background: rgba(255,255,255,0.08); color: var(--fg); }
  .pin-btn.pinned { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.4); color: #fcd34d; }
  .pin-btn.pinned:hover { background: rgba(245,158,11,0.22); }

  .detail-section { border-top: 1px solid var(--line); padding-top: 14px; }
  .section-title { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; color: var(--dim); margin-bottom: 8px; }
  .conn-list { display: flex; flex-direction: column; gap: 2px; }
  .conn-row { display: grid; grid-template-columns: 12px 1fr auto; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 12.5px; transition: background 0.15s; }
  .conn-row:hover { background: rgba(255,255,255,0.05); }
  .cn-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cn-type { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--dim); }
  .empty { font-size: 12px; color: var(--dim); padding: 8px; }

  /* Editor */
  .editor {
    position: absolute; right: 18px; top: 18px; width: 380px; max-height: calc(100vh - 36px);
    z-index: 6; padding: 20px; display: flex; flex-direction: column; gap: 14px;
    overflow-y: auto; animation: slideIn 0.25s ease-out;
  }
  .editor::-webkit-scrollbar { width: 4px; }
  .editor::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }
  .editor-head { display: flex; justify-content: space-between; align-items: center; }
  .editor-title { font-family: "JetBrains Mono", monospace; font-size: 13px; letter-spacing: 0.12em; font-weight: 600; }
  .tabs { display: flex; gap: 4px; padding: 3px; background: rgba(0,0,0,0.3); border-radius: 9px; border: 1px solid var(--line); }
  .tab { flex: 1; padding: 8px; background: transparent; border: none; color: var(--dim); font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 6px; transition: all 0.15s; }
  .tab.on { background: rgba(139,92,246,0.18); color: #ddd6fe; }
  .form { display: flex; flex-direction: column; gap: 10px; }
  .form label { display: flex; flex-direction: column; gap: 5px; font-size: 11px; color: var(--dim); font-family: "JetBrains Mono", monospace; letter-spacing: 0.06em; }
  .form input, .form select, .form textarea {
    background: rgba(0,0,0,0.35); border: 1px solid var(--line);
    border-radius: 8px; padding: 9px 11px; color: var(--fg); font-family: inherit; font-size: 13px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form input:focus, .form select:focus, .form textarea:focus { border-color: rgba(139,92,246,0.5); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
  .form input:disabled { opacity: 0.5; }
  .form textarea { resize: vertical; min-height: 60px; font-family: inherit; }
  .form input[type="range"] { padding: 0; height: 22px; accent-color: #8B5CF6; }
  .hint-inline { color: var(--dim-2); font-size: 10px; text-transform: none; letter-spacing: 0; }
  .form-actions { display: flex; gap: 8px; margin-top: 6px; }
  .connect-block { padding-top: 4px; }
  .connect-title { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--dim); letter-spacing: 0.12em; margin-bottom: 8px; }
  .connect-grid { display: flex; flex-wrap: wrap; gap: 6px; max-height: 160px; overflow-y: auto; padding: 4px; }
  .connect-grid::-webkit-scrollbar { width: 4px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px; border-radius: 999px; font-size: 11.5px; cursor: pointer;
    background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    transition: all 0.15s;
  }
  .chip:hover { background: rgba(255,255,255,0.08); }
  .chip.on { background: rgba(139,92,246,0.18); border-color: rgba(139,92,246,0.5); }
  .chip .dot { width: 8px; height: 8px; }

  .add-link-row { display: grid; grid-template-columns: 1fr auto auto; gap: 6px; align-items: center; }
  .link-edit-row { display: grid; grid-template-columns: 14px 1fr auto auto; gap: 8px; align-items: center; padding: 6px 8px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--line); }
  .link-edit-row.pending { background: rgba(139,92,246,0.08); border-color: rgba(139,92,246,0.32); }
  .link-edit-row select, .add-link-row select { background: rgba(0,0,0,0.4); border: 1px solid var(--line); color: var(--fg); padding: 5px 8px; border-radius: 6px; font-size: 11px; font-family: "JetBrains Mono", monospace; outline: none; }
  .link-edit-row .cn-label { font-size: 12px; }
  .mini-btn { width: 26px; height: 26px; border-radius: 7px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: var(--fg); cursor: pointer; font-size: 13px; line-height: 1; transition: all 0.15s; }
  .mini-btn:hover { background: rgba(255,255,255,0.1); }
  .mini-btn.danger { color: #fca5a5; border-color: rgba(239,68,68,0.3); }
  .mini-btn.danger:hover { background: rgba(239,68,68,0.18); }

  /* Status pill */
  .status {
    position: absolute; left: 18px; bottom: 18px; z-index: 5;
    padding: 8px 14px; border-radius: 999px;
    background: var(--glass); backdrop-filter: blur(14px); border: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px;
    font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--dim);
  }

  /* Hint card (right under topbar) */
  .hint-card-close { display:none; }
  @media (max-width:700px) {
    .hint-card { pointer-events:auto !important; cursor:pointer; }
    .hint-card-close { display:flex; align-items:center; justify-content:center; gap:6px; width:100%; margin-top:8px; padding:8px; background:rgba(255,255,255,0.06); border-radius:7px; font-size:11px; color:var(--fg); border:1px solid var(--line); }
  }
  .hint-card {
    position: absolute; right: 18px; bottom: 18px; z-index: 5;
    padding: 12px 14px; border-radius: 10px;
    background: var(--glass); backdrop-filter: blur(14px); border: 1px solid var(--line);
    font-family: "JetBrains Mono", monospace; font-size: 10.5px; color: var(--dim); letter-spacing: 0.04em;
    line-height: 1.7; pointer-events: none; opacity: 0.85;
  }
  .hint-card .hk { color: var(--fg); }
  .hint-card.hidden { display: none; }
  /* Drag handle */
  .detail-handle { display:none; width:40px; height:5px; border-radius:3px; background:rgba(255,255,255,0.22); margin:0 auto 2px; flex-shrink:0; }
  /* Mobile close button — nascosto su desktop */
  .detail-close-mobile { display:none; }

  @media (max-width:700px) {
    .detail-handle { display:block; }
    .detail { z-index:10; }
    /* Pulsante CHIUDI visibile e tappabile su mobile */
    .detail-close-mobile {
      display:flex; align-items:center; justify-content:center; gap:8px;
      width:100%; padding:13px 16px; margin-bottom:4px; flex-shrink:0;
      background:rgba(255,255,255,0.05); border:1px solid var(--line);

      font-size:12px; letter-spacing:.1em; cursor:pointer; transition:background .15s;
    }
    .detail-close-mobile:active { background:rgba(255,255,255,0.1); }
    /* X button più grande su mobile */
    .detail .x-btn { width:44px; height:44px; font-size:17px; }
  }

  /* Vignette */
  .vignette { position: absolute; inset: 0; pointer-events: none; z-index: 4; background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.5) 100%); }

  /* ---- Login Screen ---- */
  .login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:9999;flex-direction:column;gap:0}
  .login-box{background:rgba(20,24,40,0.92);border:1px solid var(--line-2);padding:2.8rem 2.2rem;width:100%;max-width:360px;text-align:center;box-shadow:0 0 60px rgba(139,92,246,.15)}
  .login-title{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700;letter-spacing:.14em;color:#fff;margin-bottom:.3rem}
  .login-sub{font-size:.72rem;color:var(--dim);margin-bottom:2.2rem;letter-spacing:.06em}
  .login-input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--line-2);color:var(--fg);font-family:'JetBrains Mono',monospace;font-size:.78rem;padding:.72rem 1rem;margin-bottom:.85rem;outline:none;transition:border-color .15s;box-sizing:border-box}
  .login-input:focus{border-color:var(--accent)}
  .login-btn{width:100%;background:var(--accent);border:none;color:#fff;font-family:'JetBrains Mono',monospace;font-size:.78rem;letter-spacing:.1em;padding:.78rem 1rem;cursor:pointer;transition:opacity .18s}
  .login-btn:hover{opacity:.82}
  .login-btn:disabled{opacity:.4;cursor:default}
  .login-sent{color:#34D399;font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.75;margin-top:.3rem}
  .login-err{color:#f87171;font-family:'JetBrains Mono',monospace;font-size:.7rem;margin-top:.6rem}
  /* Admin bar */
  .admin-bar{position:fixed;top:0;left:0;right:0;background:rgba(139,92,246,.1);border-bottom:1px solid rgba(139,92,246,.22);padding:.3rem 1rem;font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--accent);display:flex;align-items:center;gap:.75rem;z-index:200}
  .admin-bar select{background:rgba(139,92,246,.14);border:1px solid rgba(139,92,246,.3);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:.63rem;padding:.2rem .45rem;cursor:pointer;outline:none}
  .topbar-logout{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--dim);background:none;border:1px solid var(--line);padding:.25rem .6rem;cursor:pointer;letter-spacing:.08em;transition:color .15s,border-color .15s}
  .topbar-logout:hover{color:var(--fg);border-color:var(--line-2)}
</style>
</head>

// ---- Supabase Auth + Cloud sync multi-utente ----
const ADMIN_EMAIL = 'atti349@gmail.com';
const STORAGE_PREFIX = 'neural_os_v2_';
let _sb = null, _sbInitPromise = null, _saveCloudTimer = null;
window._nebulaUserEmail = null; // impostato dopo login

window._initSupabase = function() {
  if (!_sbInitPromise) {
    _sbInitPromise = fetch('/api/config').then(r => r.json()).then(cfg => {
      _sb = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
      return _sb;
    }).catch(() => null);
  }
  return _sbInitPromise;
};
window._initSupabase(); // avvio immediato

window.signInWithMagicLink = async function(email) {
  const sb = await window._initSupabase();
  if (!sb) return { error: 'Configurazione non disponibile' };
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: 'https://pluriagency.com/nebula' }
  });
  return { error: error?.message || null };
};

window.nebulaSignOut = async function() {
  const sb = await window._initSupabase();
  if (sb) { await sb.auth.signOut(); window._nebulaUserEmail = null; }
};

window.loadFromCloud = async function(userEmail) {
  const sb = await window._initSupabase();
  if (!sb || !userEmail) return null;
  try {
    const { data } = await sb.from('nebula_data').select('data').eq('id', userEmail).maybeSingle();
    return data?.data || null;
  } catch(e) { return null; }
};

window.saveToCloud = function(data) {
  const email = window._nebulaUserEmail;
  if (!email) return;
  clearTimeout(_saveCloudTimer);
  _saveCloudTimer = setTimeout(async () => {
    const sb = await window._initSupabase();
    if (!sb) return;
    try { await sb.from('nebula_data').upsert({ id: email, data, updated_at: new Date().toISOString() }); } catch(e) {}
  }, 800);
};

window.saveNeuralData = function(data) {
  const email = window._nebulaUserEmail;
  if (!email) return;
  try { localStorage.setItem(STORAGE_PREFIX + email, JSON.stringify(data)); } catch(e) {}
  window.saveToCloud(data);
};

window.resetNeuralData = function() {
  const email = window._nebulaUserEmail;
  if (email) try { localStorage.removeItem(STORAGE_PREFIX + email); } catch(e) {}
  return JSON.parse(JSON.stringify(window.NEURAL_DATA_DEFAULT));
};
