<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neural OS — 3D Mappa Ecosistema</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #050610;
    --fg: #e6ebf5;
    --dim: #8a93a8;
    --dim-2: #5a6378;
    --line: rgba(255,255,255,0.08);
    --line-2: rgba(255,255,255,0.14);
    --glass: rgba(12,16,28,0.62);
    --accent: #8B5CF6;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background: var(--bg); color: var(--fg); font-family: "Inter", system-ui, sans-serif; overflow:hidden; -webkit-font-smoothing: antialiased; }
  #root { position: fixed; inset: 0; }
  #three-container { position: absolute; inset: 0; z-index: 1; }
  #three-container canvas { display: block; cursor: grab; }
  #three-container canvas:active { cursor: grabbing; }

  .panel {
    background: linear-gradient(180deg, rgba(20,24,40,0.78), rgba(10,12,22,0.84));
    backdrop-filter: blur(14px) saturate(1.2);
    -webkit-backdrop-filter: blur(14px) saturate(1.2);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .sidebar {
    position: absolute; left: 18px; top: 18px; bottom: 18px;
    width: 280px; padding: 18px; z-index: 5;
    display: flex; flex-direction: column; gap: 14px;
    overflow: hidden;
  }
  .brand { display:flex; align-items:center; gap:12px; }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 10px; position: relative;
    background: radial-gradient(circle at 30% 30%, #fff, #8B5CF6 60%, #1b1140 100%);
    box-shadow: 0 0 18px rgba(139,92,246,0.55), inset 0 0 8px rgba(255,255,255,0.4);
  }
  .brand-mark span { position:absolute; inset: 6px; border-radius: 6px; background: radial-gradient(circle, rgba(255,255,255,0.85), transparent 60%); }
  .brand-title { font-family: "JetBrains Mono", monospace; font-size: 14px; letter-spacing: 0.18em; font-weight: 600; }
  .brand-sub { font-size: 11px; color: var(--dim); letter-spacing: 0.04em; }

  .counts { display: flex; flex-direction: column; gap: 2px; padding-top: 12px; border-top: 1px solid var(--line); max-height: 290px; overflow-y: auto; }
  .counts::-webkit-scrollbar { width: 4px; }
  .counts::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }
  .count-row {
    display: grid; grid-template-columns: 14px 1fr auto; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: 8px; cursor: pointer;
    font-size: 12.5px; transition: background 0.15s, opacity 0.15s;
  }
  .count-row:hover { background: rgba(255,255,255,0.04); }
  .count-row.off { opacity: 0.4; }
  .count-row.main { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
  .count-row .num { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--dim); }
  .dot { width: 10px; height: 10px; border-radius: 50%; display:inline-block; }

  .search { position: relative; }
  .search input {
    width: 100%; padding: 10px 32px 10px 12px;
    background: rgba(0,0,0,0.35); border: 1px solid var(--line);
    border-radius: 9px; color: var(--fg); font-size: 13px; font-family: inherit; outline: none;
  }
  .search input::placeholder { color: var(--dim-2); }
  .search input:focus { border-color: rgba(139,92,246,0.5); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
  .search svg { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--dim); }

  .dual-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .big-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 8px; border-radius: 9px; cursor: pointer;
    background: rgba(139,92,246,0.16); border: 1px solid rgba(139,92,246,0.42);
    color: #ddd6fe; font-family: inherit; font-size: 12px; font-weight: 500;
    transition: all 0.15s;
  }
  .big-btn:hover { background: rgba(139,92,246,0.26); border-color: rgba(139,92,246,0.6); }
  .big-btn.cluster { background: rgba(244,114,182,0.14); border-color: rgba(244,114,182,0.4); color: #fbcfe8; }
  .big-btn.cluster:hover { background: rgba(244,114,182,0.24); border-color: rgba(244,114,182,0.6); }

  /* Cluster editor */
  .cluster-editor .editor-blurb { margin: 0; padding: 10px 12px; border-radius: 9px; background: rgba(244,114,182,0.08); border: 1px solid rgba(244,114,182,0.25); font-size: 12px; line-height: 1.55; color: rgba(230,235,245,0.78); }
  .check-label { flex-direction: row !important; align-items: center; gap: 8px !important; cursor: pointer; color: var(--fg) !important; font-size: 13px !important; font-family: inherit !important; letter-spacing: 0 !important; text-transform: none !important; }
  .check-label input { width: 16px; height: 16px; accent-color: #F472B6; cursor: pointer; }
  .chip-tag { font-family: "JetBrains Mono", monospace; font-size: 9.5px; color: var(--dim); margin-left: 6px; padding: 1px 5px; border-radius: 4px; background: rgba(0,0,0,0.3); }

  .quick-list { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; padding-top: 10px; border-top: 1px solid var(--line); }
  .quick-list::-webkit-scrollbar { width: 4px; }
  .quick-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }
  .quick-title { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--dim); letter-spacing: 0.18em; padding: 4px 8px; }
  .quick-item {
    display: grid; grid-template-columns: 14px 1fr; gap: 10px; align-items: center;
    padding: 7px 8px; border-radius: 8px; cursor: pointer; font-size: 12.5px;
  }
  .quick-item:hover { background: rgba(255,255,255,0.04); }
  .qlabel { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .topbar {
    position: absolute; left: 50%; top: 18px; transform: translateX(-50%);
    z-index: 5; display: flex; align-items: center; gap: 20px;
    padding: 9px 16px; border-radius: 12px;
    background: var(--glass); backdrop-filter: blur(14px); border: 1px solid var(--line);
    font-size: 12px;
  }
  .tb-left, .tb-right, .tb-mid { display:flex; align-items:center; gap: 10px; }
  .tb-left .kbd-mono { font-family: "JetBrains Mono", monospace; letter-spacing: 0.18em; font-weight: 600; }
  .dim { color: var(--dim); }
  .tb-mid { color: var(--dim); font-family: "JetBrains Mono", monospace; }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #34D399; box-shadow: 0 0 10px #34D399; animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .tb-btn {
    background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    color: var(--fg); padding: 6px 12px; border-radius: 8px;
    font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.15s;
  }
  .tb-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .tb-btn:not(:disabled):hover { background: rgba(255,255,255,0.08); border-color: var(--line-2); }
  .tb-btn.on { background: rgba(139,92,246,0.18); border-color: rgba(139,92,246,0.5); color: #C4B5FD; }
  .hint { color: var(--dim); font-family: "JetBrains Mono", monospace; font-size: 11px; }

  .detail {
    position: absolute; right: 18px; top: 18px; width: 360px; max-height: calc(100vh - 36px);
    z-index: 5; padding: 20px; display: flex; flex-direction: column; gap: 14px;
    overflow-y: auto;
    animation: slideIn 0.25s ease-out;
  }
  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }
  @keyframes slideIn { from{transform: translateX(20px); opacity:0;} to{transform: none; opacity:1;} }
  .detail-head { display: flex; justify-content: space-between; align-items: center; }
  .detail-cat { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.16em; padding: 4px 10px; border: 1px solid; border-radius: 999px; }
  .x-btn { width: 28px; height: 28px; border-radius: 8px; background: transparent; border: 1px solid var(--line); color: var(--dim); cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .x-btn:hover { background: rgba(255,255,255,0.06); color: var(--fg); }
  .detail-title-row { display: flex; align-items: center; gap: 12px; }
  .detail-title-row h2 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .node-orb { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid; box-shadow: 0 0 14px currentColor; flex-shrink: 0; }
  .detail-id { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--dim); }
  .detail-id span { color: var(--fg); }
  .detail-desc { margin: 0; font-size: 13px; line-height: 1.55; color: rgba(230,235,245,0.82); }
  .detail-url { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 14px; border-radius: 9px; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.3); color: #C4B5FD; text-decoration: none; font-family: "JetBrains Mono", monospace; font-size: 12px; transition: all 0.15s; }
  .detail-url:hover { background: rgba(139,92,246,0.18); border-color: rgba(139,92,246,0.5); }
  .detail-actions { display: flex; gap: 8px; }
  .act-btn { flex: 1; padding: 9px; border-radius: 9px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: var(--fg); cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.15s; }
  .act-btn:hover { background: rgba(255,255,255,0.08); }
  .act-btn.primary { background: rgba(139,92,246,0.15); border-color: rgba(139,92,246,0.4); color: #ddd6fe; }
  .act-btn.primary:hover { background: rgba(139,92,246,0.25); }

  .danger-btn { padding: 9px; border-radius: 9px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.15s; }
  .danger-btn:hover { background: rgba(239,68,68,0.18); }

  .detail-section { border-top: 1px solid var(--line); padding-top: 14px; }
  .section-title { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; color: var(--dim); margin-bottom: 8px; }
  .conn-list { display: flex; flex-direction: column; gap: 2px; }
  .conn-row { display: grid; grid-template-columns: 12px 1fr auto; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 12.5px; transition: background 0.15s; }
  .conn-row:hover { background: rgba(255,255,255,0.05); }
  .cn-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cn-type { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--dim); }
  .empty { font-size: 12px; color: var(--dim); padding: 8px; }

  /* Editor */
  .editor {
    position: absolute; right: 18px; top: 18px; width: 380px; max-height: calc(100vh - 36px);
    z-index: 6; padding: 20px; display: flex; flex-direction: column; gap: 14px;
    overflow-y: auto; animation: slideIn 0.25s ease-out;
  }
  .editor::-webkit-scrollbar { width: 4px; }
  .editor::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }
  .editor-head { display: flex; justify-content: space-between; align-items: center; }
  .editor-title { font-family: "JetBrains Mono", monospace; font-size: 13px; letter-spacing: 0.12em; font-weight: 600; }
  .tabs { display: flex; gap: 4px; padding: 3px; background: rgba(0,0,0,0.3); border-radius: 9px; border: 1px solid var(--line); }
  .tab { flex: 1; padding: 8px; background: transparent; border: none; color: var(--dim); font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 6px; transition: all 0.15s; }
  .tab.on { background: rgba(139,92,246,0.18); color: #ddd6fe; }
  .form { display: flex; flex-direction: column; gap: 10px; }
  .form label { display: flex; flex-direction: column; gap: 5px; font-size: 11px; color: var(--dim); font-family: "JetBrains Mono", monospace; letter-spacing: 0.06em; }
  .form input, .form select, .form textarea {
    background: rgba(0,0,0,0.35); border: 1px solid var(--line);
    border-radius: 8px; padding: 9px 11px; color: var(--fg); font-family: inherit; font-size: 13px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form input:focus, .form select:focus, .form textarea:focus { border-color: rgba(139,92,246,0.5); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
  .form input:disabled { opacity: 0.5; }
  .form textarea { resize: vertical; min-height: 60px; font-family: inherit; }
  .form input[type="range"] { padding: 0; height: 22px; accent-color: #8B5CF6; }
  .hint-inline { color: var(--dim-2); font-size: 10px; text-transform: none; letter-spacing: 0; }
  .form-actions { display: flex; gap: 8px; margin-top: 6px; }
  .connect-block { padding-top: 4px; }
  .connect-title { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--dim); letter-spacing: 0.12em; margin-bottom: 8px; }
  .connect-grid { display: flex; flex-wrap: wrap; gap: 6px; max-height: 160px; overflow-y: auto; padding: 4px; }
  .connect-grid::-webkit-scrollbar { width: 4px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px; border-radius: 999px; font-size: 11.5px; cursor: pointer;
    background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    transition: all 0.15s;
  }
  .chip:hover { background: rgba(255,255,255,0.08); }
  .chip.on { background: rgba(139,92,246,0.18); border-color: rgba(139,92,246,0.5); }
  .chip .dot { width: 8px; height: 8px; }

  .add-link-row { display: grid; grid-template-columns: 1fr auto auto; gap: 6px; align-items: center; }
  .link-edit-row { display: grid; grid-template-columns: 14px 1fr auto auto; gap: 8px; align-items: center; padding: 6px 8px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--line); }
  .link-edit-row.pending { background: rgba(139,92,246,0.08); border-color: rgba(139,92,246,0.32); }
  .link-edit-row select, .add-link-row select { background: rgba(0,0,0,0.4); border: 1px solid var(--line); color: var(--fg); padding: 5px 8px; border-radius: 6px; font-size: 11px; font-family: "JetBrains Mono", monospace; outline: none; }
  .link-edit-row .cn-label { font-size: 12px; }
  .mini-btn { width: 26px; height: 26px; border-radius: 7px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: var(--fg); cursor: pointer; font-size: 13px; line-height: 1; transition: all 0.15s; }
  .mini-btn:hover { background: rgba(255,255,255,0.1); }
  .mini-btn.danger { color: #fca5a5; border-color: rgba(239,68,68,0.3); }
  .mini-btn.danger:hover { background: rgba(239,68,68,0.18); }

  /* Status pill */
  .status {
    position: absolute; left: 18px; bottom: 18px; z-index: 5;
    padding: 8px 14px; border-radius: 999px;
    background: var(--glass); backdrop-filter: blur(14px); border: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px;
    font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--dim);
  }

  /* Hint card (right under topbar) */
  .hint-card {
    position: absolute; right: 18px; bottom: 18px; z-index: 5;
    padding: 12px 14px; border-radius: 10px;
    background: var(--glass); backdrop-filter: blur(14px); border: 1px solid var(--line);
    font-family: "JetBrains Mono", monospace; font-size: 10.5px; color: var(--dim); letter-spacing: 0.04em;
    line-height: 1.7; pointer-events: none; opacity: 0.85;
  }
  .hint-card .hk { color: var(--fg); }
  .hint-card.hidden { display: none; }

  /* Vignette */
  .vignette { position: absolute; inset: 0; pointer-events: none; z-index: 4; background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.5) 100%); }
</style>
</head>

    { source: "pluriagency", target: "crm",               type: "uses" },
    { source: "pluriagency", target: "calendly",          type: "uses" },
    { source: "pluriagency", target: "linkedin_personal", type: "social" },
    { source: "lorenzo_industrie", target: "crm",               type: "uses" },
    { source: "lorenzo_industrie", target: "linkedin_personal", type: "social" },
    { source: "disfatti", target: "selekt",              type: "related" },
    { source: "disfatti", target: "instagram_disfatti",  type: "social" },
    { source: "selekt",   target: "supabase",            type: "uses" },
    { source: "thinkr",   target: "supabase",            type: "uses" },
    { source: "thinkr",   target: "ai_local",            type: "future" },

};
const STORAGE_KEY = "neural_os_data_v2";
window.loadNeuralData = function() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return {
        categories: { ...window.NEURAL_DATA_DEFAULT.categories, ...(parsed.categories || {}) },
        linkTypes:  { ...window.NEURAL_DATA_DEFAULT.linkTypes,  ...(parsed.linkTypes  || {}) },
        nodes: parsed.nodes || window.NEURAL_DATA_DEFAULT.nodes,
        links: parsed.links || window.NEURAL_DATA_DEFAULT.links
      };
    }
  } catch (e) { console.warn("loadNeuralData failed", e); }
  return JSON.parse(JSON.stringify(window.NEURAL_DATA_DEFAULT));
};
window.saveNeuralData = function(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) { console.warn(e); }
};
window.resetNeuralData = function() {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  return JSON.parse(JSON.stringify(window.NEURAL_DATA_DEFAULT));
};

<script src="graph3d.js?v=5"></script>
<script type="text/babel">
// Neural OS v2 — UI: Sidebar, TopBar, NodePanel, EditorPanel
// Editor supporta: creazione/modifica nodi (con cluster), aggiunta/rimozione link, modifica link esistenti.
const { useState, useMemo, useEffect, useRef } = React;

function Sidebar({ data, activeCats, setActiveCats, searchQuery, setSearchQuery, totals, focusNode, openEditor, openClusterEditor }) {
  const cats = Object.entries(data.categories);
  const toggle = (key) => {
    const next = new Set(activeCats);
    if (key === "all") return setActiveCats(new Set(["all", ...Object.keys(data.categories)]));
    next.delete("all");
    if (next.has(key)) next.delete(key); else next.add(key);
    if (next.size === 0) next.add("all");
    setActiveCats(next);
  };
  const isActive = (k) => activeCats.has("all") || activeCats.has(k);

  const clusterHeads = useMemo(() => {
    const ids = new Set();
    for (const n of data.nodes) if (n.cluster && n.cluster !== n.id) ids.add(n.cluster);
    return [...ids].map(id => data.nodes.find(n => n.id === id)).filter(Boolean);
  }, [data]);

  return (
    <div className="panel sidebar">
      <div className="brand">
        <div className="brand-mark"><span/></div>
        <div>
          <div className="brand-title">NEURAL OS</div>
          <div className="brand-sub">Sistema operativo personale · 3D</div>
        </div>
      </div>
      <div className="counts">
        <div className="count-row main" onClick={() => toggle("all")}>
          <span className="dot" style={{background:"#fff"}}/>
          <span>Tutti i nodi</span>
          <span className="num">{totals.nodes}</span>
        </div>
        {cats.filter(([k]) => k !== "hub").map(([k, c]) => (
          <div key={k} className={`count-row ${isActive(k) ? "on" : "off"}`} onClick={() => toggle(k)}>
            <span className="dot" style={{background:c.color, boxShadow:`0 0 10px ${c.color}`}}/>
            <span>{c.label}</span>
            <span className="num">{totals.byCat[k] || 0}</span>
          </div>
        ))}
      </div>
      <div className="search">
        <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Cerca nel grafo…" spellCheck={false}/>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </div>
      <div className="dual-btns">
        <button className="big-btn" onClick={openEditor}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>
          Aggiungi nodo / link
        </button>
        <button className="big-btn cluster" onClick={openClusterEditor} title="Crea una nuova sotto-nebulosa">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9" strokeDasharray="2 3"/></svg>
          Sotto-nebulosa
        </button>
      </div>
      <div className="quick-list">
        <div className="quick-title">CORE</div>
        {data.nodes.filter(n => ["hub","pluriagency","disfatti","thinkr","selekt","lorenzo_industrie","ai_local"].includes(n.id)).map(n => (
          <div key={n.id} className="quick-item" onClick={() => focusNode(n.id)}>
            <span className="dot" style={{background: data.categories[n.category].color, boxShadow:`0 0 8px ${data.categories[n.category].color}`}}/>
            <span className="qlabel">{n.label}</span>
          </div>
        ))}
        {clusterHeads.length > 0 && (
          <>
            <div className="quick-title" style={{marginTop:8}}>SOTTONEBULOSE</div>
            {clusterHeads.map(n => (
              <div key={n.id} className="quick-item" onClick={() => focusNode(n.id)}>
                <span className="dot" style={{background: data.categories[n.category].color, boxShadow:`0 0 8px ${data.categories[n.category].color}`}}/>
                <span className="qlabel">{n.label}</span>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

function TopBar({ totals, focusMode, setFocusMode, selectedId, onResetData }) {
  return (
    <div className="topbar">
      <div className="tb-left">
        <span className="kbd-mono">NEURAL OS</span>
        <span className="dim">/</span>
        <span className="dim">3D ecosistema</span>
      </div>
      <div className="tb-mid">
        <span className="pulse-dot"/>
        {totals.nodes} nodi · {totals.links} sinapsi · live
      </div>
      <div className="tb-right">
        <button className={`tb-btn ${focusMode ? "on" : ""}`} disabled={!selectedId} onClick={() => setFocusMode(v => !v)}>
          Focus {focusMode ? "ON" : ""}
        </button>
        <button className="tb-btn" onClick={onResetData} title="Ripristina i dati di default">Reset</button>
        <span className="hint">L-drag pianeti · R-drag pan · M-drag rotazione</span>
      </div>
    </div>
  );
}

function NodePanel({ data, node, onClose, focusNode, setFocusMode, focusMode, onEdit, onDelete }) {
  if (!node) return null;
  const cat = data.categories[node.category];
  const conns = data.links
    .filter(l => l.source === node.id || l.target === node.id)
    .map((l, i) => {
      const otherId = l.source === node.id ? l.target : l.source;
      const other = data.nodes.find(n => n.id === otherId);
      return { other, type: l.type, idx: i };
    })
    .filter(x => x.other);
  const cluster = node.cluster && node.cluster !== node.id ? data.nodes.find(n => n.id === node.cluster) : null;
  return (
    <div className="panel detail">
      <div className="detail-head">
        <div className="detail-cat" style={{borderColor: cat.color, color: cat.color, boxShadow:`inset 0 0 12px ${cat.color}33`}}>
          {cat.label.toUpperCase()}
        </div>
        <button className="x-btn" onClick={onClose} aria-label="Chiudi">✕</button>
      </div>
      <div className="detail-title-row">
        <div className="node-orb" style={{background:`radial-gradient(circle, ${cat.color}66, ${cat.color}00 70%)`, borderColor: cat.color, color: cat.color}}/>
        <h2>{node.label}</h2>
      </div>
      <div className="detail-id">id: <span>{node.id}</span> · type: <span>{node.type}</span> · size: <span>{node.size}</span></div>
      {cluster && <div className="detail-id">cluster: <span>{cluster.label}</span></div>}
      {node.description && <p className="detail-desc">{node.description}</p>}
      {node.url && (
        <a className="detail-url" href={node.url} target="_blank" rel="noopener noreferrer">
          <span>{node.url.replace(/^https?:\/\//,"")}</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 17L17 7"/><path d="M8 7h9v9"/></svg>
        </a>
      )}
      <div className="detail-actions">
        <button className="act-btn primary" onClick={() => setFocusMode(true)}>{focusMode ? "Focus attivo" : "Focus su questo nodo"}</button>
        <button className="act-btn" onClick={() => onEdit(node)}>Modifica</button>
      </div>
      <div className="detail-section">
        <div className="section-title">Connessioni · {conns.length}</div>
        <div className="conn-list">
          {conns.map(({ other, type }) => {
            const oc = data.categories[other.category];
            return (
              <div key={other.id} className="conn-row" onClick={() => focusNode(other.id)}>
                <span className="dot" style={{background: oc.color, boxShadow:`0 0 8px ${oc.color}`}}/>
                <span className="cn-label">{other.label}</span>
                <span className="cn-type">{type}</span>
              </div>
            );
          })}
          {conns.length === 0 && <div className="empty">Nessuna connessione.</div>}
        </div>
      </div>
      {node.id !== "hub" && (
        <button className="danger-btn" onClick={() => onDelete(node)}>Elimina nodo</button>
      )}
    </div>
  );
}

function EditorPanel({ data, onClose, onSave, editingNode, defaultConnect }) {
  const isEdit = !!editingNode;
  const [tab, setTab] = useState("node");
  const slugify = (s) => s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"").slice(0,40);
  const [label, setLabel] = useState(editingNode?.label || "");
  const [id, setId] = useState(editingNode?.id || "");
  const [category, setCategory] = useState(editingNode?.category || "custom");
  const [size, setSize] = useState(editingNode?.size || 1.6);
  const [url, setUrl] = useState(editingNode?.url || "");
  const [description, setDescription] = useState(editingNode?.description || "");
  const [cluster, setCluster] = useState(editingNode?.cluster || "");
  const [connectIds, setConnectIds] = useState(new Set(defaultConnect ? [defaultConnect] : ["hub"]));
  const [linkType, setLinkType] = useState("custom");
  const existingLinks = useMemo(() => {
    if (!isEdit) return [];
    return data.links.map((l, i) => ({ ...l, _idx: i })).filter(l => l.source === editingNode.id || l.target === editingNode.id);
  }, [data, editingNode, isEdit]);
  const [linkPatches, setLinkPatches] = useState({});
  const [pendingLinks, setPendingLinks] = useState([]);
  const [newLinkTarget, setNewLinkTarget] = useState("");
  const [newLinkType, setNewLinkType] = useState("custom");
  const [linkSource, setLinkSource] = useState(data.nodes[0]?.id || "");
  const [linkTarget, setLinkTarget] = useState("");
  const [linkTypeOnly, setLinkTypeOnly] = useState("custom");
  useEffect(() => { if (!isEdit && label) setId(slugify(label)); }, [label, isEdit]);
  const toggleConnect = (nid) => { const next = new Set(connectIds); if (next.has(nid)) next.delete(nid); else next.add(nid); setConnectIds(next); };
  const submitNode = () => {
    if (!label.trim()) return alert("Inserisci un'etichetta.");
    let finalId = id.trim() || slugify(label);
    if (!isEdit && data.nodes.some(n => n.id === finalId)) finalId = finalId + "_" + Math.random().toString(36).slice(2,5);
    const node = { id: finalId, type: category, category, label: label.trim(), size: Number(size) || 1.6, url: url.trim() || undefined, description: description.trim() || undefined, cluster: cluster || undefined };
    if (isEdit) {
      onSave({ kind: "edit_node", node, originalId: editingNode.id, linkPatches, addLinks: pendingLinks.map(pl => ({ source: editingNode.id, target: pl.target, type: pl.type })) });
    } else {
      onSave({ kind: "create_node", node, newLinks: [...connectIds].map(target => ({ source: finalId, target, type: linkType })) });
    }
  };
  const submitLink = () => {
    if (!linkSource || !linkTarget || linkSource === linkTarget) return alert("Seleziona due nodi diversi.");
    onSave({ kind: "link", link: { source: linkSource, target: linkTarget, type: linkTypeOnly } });
  };
  const patchLink = (idx, patch) => setLinkPatches(prev => ({ ...prev, [idx]: { ...(prev[idx] === "removed" ? {} : prev[idx] || {}), ...patch } }));
  const removeLink = (idx) => setLinkPatches(prev => ({ ...prev, [idx]: "removed" }));
  const restoreLink = (idx) => setLinkPatches(prev => { const n = {...prev}; delete n[idx]; return n; });
  const addPending = () => {
    if (!newLinkTarget) return;
    if (newLinkTarget === editingNode.id) return alert("Non puoi collegare un nodo a sé stesso.");
    if (existingLinks.some(l => (l.source === newLinkTarget || l.target === newLinkTarget))) return alert("Esiste già una connessione con questo nodo.");
    if (pendingLinks.some(p => p.target === newLinkTarget)) return;
    setPendingLinks([...pendingLinks, { target: newLinkTarget, type: newLinkType }]);
    setNewLinkTarget("");
  };
  const removePending = (target) => setPendingLinks(pendingLinks.filter(p => p.target !== target));
  const getLinkUI = (l) => {
    const otherId = l.source === editingNode.id ? l.target : l.source;
    const other = data.nodes.find(n => n.id === otherId);
    const removed = linkPatches[l._idx] === "removed";
    const currentType = (linkPatches[l._idx] && linkPatches[l._idx] !== "removed" && linkPatches[l._idx].type) || l.type;
    return { other, removed, currentType };
  };
  return (
    <div className="panel editor">
      <div className="editor-head">
        <div className="editor-title">{isEdit ? `Modifica · ${editingNode.label}` : "Aggiungi al grafo"}</div>
        <button className="x-btn" onClick={onClose}>✕</button>
      </div>
      <div className="tabs">
        <button className={`tab ${tab==="node"?"on":""}`} onClick={() => setTab("node")}>{isEdit ? "Dati nodo" : "Nuovo nodo"}</button>
        {isEdit && <button className={`tab ${tab==="links"?"on":""}`} onClick={() => setTab("links")}>Collegamenti ({existingLinks.length + pendingLinks.length})</button>}
        {!isEdit && <button className={`tab ${tab==="newlink"?"on":""}`} onClick={() => setTab("newlink")}>Solo connessione</button>}
      </div>
      {tab === "node" && (
        <div className="form">
          <label>Etichetta<input value={label} onChange={e => setLabel(e.target.value)} placeholder="Es. Mio Progetto"/></label>
          <label>ID {isEdit && <span className="hint-inline">(non modificabile)</span>}<input value={id} onChange={e => setId(slugify(e.target.value))} disabled={isEdit} placeholder="es. mio_progetto"/></label>
          <label>Categoria<select value={category} onChange={e => setCategory(e.target.value)}>{Object.entries(data.categories).filter(([k]) => k !== "hub").map(([k, c]) => <option key={k} value={k}>{c.label}</option>)}</select></label>
          <label>Sotto-nebulosa (cluster)<select value={cluster} onChange={e => setCluster(e.target.value)}><option value="">— nessuna (orbita libera) —</option>{data.nodes.filter(n => !isEdit || n.id !== editingNode.id).map(n => <option key={n.id} value={n.id}>↳ dentro {n.label}</option>)}</select><span className="hint-inline" style={{marginTop:4}}>I nodi con la stessa sotto-nebulosa orbitano attorno al loro head.</span></label>
          <label>URL (opzionale)<input value={url} onChange={e => setUrl(e.target.value)} placeholder="https://..."/></label>
          <label>Dimensione · {Number(size).toFixed(1)}<input type="range" min="1" max="3" step="0.1" value={size} onChange={e => setSize(e.target.value)}/></label>
          <label>Descrizione (opzionale)<textarea rows="3" value={description} onChange={e => setDescription(e.target.value)} placeholder="Cosa rappresenta questo nodo?"/></label>
          {!isEdit && (
            <>
              <label>Tipo di collegamento iniziale<select value={linkType} onChange={e => setLinkType(e.target.value)}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select></label>
              <div className="connect-block">
                <div className="connect-title">Collega a · {connectIds.size} selezionati</div>
                <div className="connect-grid">{data.nodes.map(n => <div key={n.id} className={`chip ${connectIds.has(n.id) ? "on" : ""}`} onClick={() => toggleConnect(n.id)} style={{borderColor: connectIds.has(n.id) ? data.categories[n.category].color : undefined}}><span className="dot" style={{background: data.categories[n.category].color}}/>{n.label}</div>)}</div>
              </div>
            </>
          )}
          <div className="form-actions">
            <button className="act-btn" onClick={onClose}>Annulla</button>
            <button className="act-btn primary" onClick={submitNode}>{isEdit ? "Salva modifiche" : "Crea nodo"}</button>
          </div>
        </div>
      )}
      {isEdit && tab === "links" && (
        <div className="form">
          <div className="connect-title">Collegamenti esistenti</div>
          {existingLinks.length === 0 && <div className="empty">Nessuna connessione esistente.</div>}
          {existingLinks.map(l => {
            const { other, removed, currentType } = getLinkUI(l);
            if (!other) return null;
            const oc = data.categories[other.category];
            return (
              <div key={l._idx} className="link-edit-row" style={{opacity: removed ? 0.4 : 1}}>
                <span className="dot" style={{background: oc.color, boxShadow:`0 0 8px ${oc.color}`}}/>
                <span className="cn-label" style={{textDecoration: removed ? "line-through" : "none"}}>{other.label}</span>
                <select disabled={removed} value={currentType} onChange={e => patchLink(l._idx, { type: e.target.value })}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select>
                {removed ? <button className="mini-btn" onClick={() => restoreLink(l._idx)}>↶</button> : <button className="mini-btn danger" onClick={() => removeLink(l._idx)}>✕</button>}
              </div>
            );
          })}
          {pendingLinks.length > 0 && (
            <>
              <div className="connect-title" style={{marginTop:14}}>Da aggiungere</div>
              {pendingLinks.map(pl => {
                const other = data.nodes.find(n => n.id === pl.target);
                if (!other) return null;
                const oc = data.categories[other.category];
                return (
                  <div key={pl.target} className="link-edit-row pending">
                    <span className="dot" style={{background: oc.color, boxShadow:`0 0 8px ${oc.color}`}}/>
                    <span className="cn-label">{other.label}</span>
                    <select value={pl.type} onChange={e => setPendingLinks(pendingLinks.map(p => p.target === pl.target ? {...p, type: e.target.value} : p))}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select>
                    <button className="mini-btn danger" onClick={() => removePending(pl.target)}>✕</button>
                  </div>
                );
              })}
            </>
          )}
          <div className="connect-title" style={{marginTop:14}}>Aggiungi nuovo collegamento</div>
          <div className="add-link-row">
            <select value={newLinkTarget} onChange={e => setNewLinkTarget(e.target.value)}><option value="">— scegli nodo —</option>{data.nodes.filter(n => n.id !== editingNode.id && !existingLinks.some(l => l.source === n.id || l.target === n.id) && !pendingLinks.some(p => p.target === n.id)).map(n => <option key={n.id} value={n.id}>{n.label}</option>)}</select>
            <select value={newLinkType} onChange={e => setNewLinkType(e.target.value)}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select>
            <button className="mini-btn" onClick={addPending}>+</button>
          </div>
          <div className="form-actions" style={{marginTop:12}}>
            <button className="act-btn" onClick={onClose}>Annulla</button>
            <button className="act-btn primary" onClick={submitNode}>Salva tutto</button>
          </div>
        </div>
      )}
      {!isEdit && tab === "newlink" && (
        <div className="form">
          <label>Sorgente<select value={linkSource} onChange={e => setLinkSource(e.target.value)}>{data.nodes.map(n => <option key={n.id} value={n.id}>{n.label}</option>)}</select></label>
          <label>Destinazione<select value={linkTarget} onChange={e => setLinkTarget(e.target.value)}><option value="">— scegli —</option>{data.nodes.filter(n => n.id !== linkSource).map(n => <option key={n.id} value={n.id}>{n.label}</option>)}</select></label>
          <label>Tipo<select value={linkTypeOnly} onChange={e => setLinkTypeOnly(e.target.value)}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select></label>
          <div className="form-actions">
            <button className="act-btn" onClick={onClose}>Annulla</button>
            <button className="act-btn primary" onClick={submitLink}>Crea connessione</button>
          </div>
        </div>
      )}
    </div>
  );
}

window.Sidebar = Sidebar;
window.TopBar = TopBar;
window.NodePanel = NodePanel;
window.EditorPanel = EditorPanel;

function ClusterCreator({ data, onClose, onSave }) {
  const slugify = (s) => s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"").slice(0,40);
  const [label, setLabel] = useState("");
  const [id, setId] = useState("");
  const [category, setCategory] = useState("custom");
  const [size, setSize] = useState(2.0);
  const [description, setDescription] = useState("");
  const [linkToHub, setLinkToHub] = useState(true);
  const [linkType, setLinkType] = useState("core");
  const [memberIds, setMemberIds] = useState(new Set());
  useEffect(() => { if (label) setId(slugify(label)); }, [label]);
  const toggleMember = (nid) => { const next = new Set(memberIds); if (next.has(nid)) next.delete(nid); else next.add(nid); setMemberIds(next); };
  const submit = () => {
    if (!label.trim()) return alert("Dai un nome alla sotto-nebulosa.");
    let finalId = id.trim() || slugify(label);
    if (data.nodes.some(n => n.id === finalId)) finalId = finalId + "_" + Math.random().toString(36).slice(2,5);
    const headNode = { id: finalId, type: "cluster", category, label: label.trim(), size: Number(size) || 2.0, description: description.trim() || undefined, isClusterHead: true };
    onSave({ kind: "create_cluster", head: headNode, members: [...memberIds], linkToHub, linkType });
  };
  return (
    <div className="panel editor cluster-editor">
      <div className="editor-head">
        <div className="editor-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{verticalAlign:"middle", marginRight:6}}><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9" strokeDasharray="2 3"/></svg>
          Nuova sotto-nebulosa
        </div>
        <button className="x-btn" onClick={onClose}>✕</button>
      </div>
      <p className="editor-blurb">Una sotto-nebulosa è un nodo "head" attorno a cui altri nodi orbitano. Scegli il nome, opzionalmente collegala all'HUB, e seleziona quali nodi esistenti vivranno al suo interno.</p>
      <div className="form">
        <label>Nome<input value={label} onChange={e => setLabel(e.target.value)} placeholder="Es. Marketing, Photo, Tech…"/></label>
        <label>ID <span className="hint-inline">(automatico)</span><input value={id} onChange={e => setId(slugify(e.target.value))} placeholder="es. marketing"/></label>
        <label>Categoria / colore<select value={category} onChange={e => setCategory(e.target.value)}>{Object.entries(data.categories).filter(([k]) => k !== "hub").map(([k, c]) => <option key={k} value={k}>{c.label}</option>)}</select></label>
        <label>Dimensione head · {Number(size).toFixed(1)}<input type="range" min="1.5" max="3" step="0.1" value={size} onChange={e => setSize(e.target.value)}/></label>
        <label>Descrizione (opzionale)<textarea rows="2" value={description} onChange={e => setDescription(e.target.value)} placeholder="Cosa raggruppa questa sotto-nebulosa?"/></label>
        <label className="check-label"><input type="checkbox" checked={linkToHub} onChange={e => setLinkToHub(e.target.checked)}/><span>Collega l'head all'HUB CENTRALE</span></label>
        {linkToHub && <label>Tipo collegamento all'HUB<select value={linkType} onChange={e => setLinkType(e.target.value)}>{Object.keys(data.linkTypes).map(k => <option key={k} value={k}>{k}</option>)}</select></label>}
        <div className="connect-block">
          <div className="connect-title">Sposta nodi esistenti dentro · {memberIds.size} selezionati</div>
          <div className="connect-grid">{data.nodes.filter(n => n.id !== "hub" && !n.isClusterHead).map(n => <div key={n.id} className={`chip ${memberIds.has(n.id) ? "on" : ""}`} onClick={() => toggleMember(n.id)} style={{borderColor: memberIds.has(n.id) ? data.categories[n.category].color : undefined}}><span className="dot" style={{background: data.categories[n.category].color}}/>{n.label}{n.cluster && <span className="chip-tag">in {data.nodes.find(x => x.id === n.cluster)?.label || "?"}</span>}</div>)}</div>
        </div>
        <div className="form-actions">
          <button className="act-btn" onClick={onClose}>Annulla</button>
          <button className="act-btn primary" onClick={submit}>Crea sotto-nebulosa</button>
        </div>
      </div>
    </div>
  );
}

window.ClusterCreator = ClusterCreator;
</script>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

function App() {
  const [data, setData] = useState(() => window.loadNeuralData());
  const [selectedId, setSelectedId] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);
  const [activeCats, setActiveCats] = useState(() => new Set(["all", ...Object.keys(window.NEURAL_DATA_DEFAULT.categories)]));
  const [searchQuery, setSearchQuery] = useState("");
  const [focusMode, setFocusMode] = useState(false);
  const [hintVisible, setHintVisible] = useState(true);
  const [editorOpen, setEditorOpen] = useState(false);
  const [editingNode, setEditingNode] = useState(null);
  const [clusterCreatorOpen, setClusterCreatorOpen] = useState(false);

  const containerRef = useRef(null);
  const graphRef = useRef(null);

  // Init 3D scene once
  useEffect(() => {
    if (!containerRef.current) return;
    const g = window.NeuralGraph3D.init({
      container: containerRef.current,
      onSelect: (id) => { setSelectedId(id); if (id) setHintVisible(false); },
      onHover: (id) => setHoveredId(id)
    });
    graphRef.current = g;
    g.setData(data);
    return () => g.dispose();
  }, []);

  // sync data → graph
  useEffect(() => {
    if (graphRef.current) graphRef.current.setData(data);
    window.saveNeuralData(data);
  }, [data]);

  // sync filters
  useEffect(() => {
    graphRef.current?.setFilters(activeCats, searchQuery);
  }, [activeCats, searchQuery]);
  useEffect(() => { graphRef.current?.setSelected(selectedId); }, [selectedId]);
  useEffect(() => { graphRef.current?.setFocusMode(focusMode); }, [focusMode]);

  const totals = useMemo(() => {
    const byCat = {};
    for (const n of data.nodes) byCat[n.category] = (byCat[n.category] || 0) + 1;
    return { nodes: data.nodes.length, links: data.links.length, byCat };
  }, [data]);

  const selectedNode = selectedId ? data.nodes.find(n => n.id === selectedId) : null;

  const focusNode = useCallback((id) => {
    setSelectedId(id);
    setHintVisible(false);
    setTimeout(() => graphRef.current?.focusNode(id), 30);
  }, []);

  // ESC
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") {
        if (editorOpen) { setEditorOpen(false); setEditingNode(null); }
        else if (clusterCreatorOpen) { setClusterCreatorOpen(false); }
        else { setSelectedId(null); setFocusMode(false); }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [editorOpen, clusterCreatorOpen]);

  const handleSave = (payload) => {
    setData(prev => {
      const next = { ...prev, nodes: [...prev.nodes], links: [...prev.links] };
      if (payload.kind === "create_node") {
        next.nodes.push(payload.node);
        for (const l of payload.newLinks) next.links.push(l);
      } else if (payload.kind === "edit_node") {
        // sostituisci nodo
        next.nodes = next.nodes.map(n => n.id === payload.originalId ? { ...n, ...payload.node } : n);
        // link patches
        next.links = next.links
          .map((l, i) => {
            const p = payload.linkPatches[i];
            if (p === "removed") return null;
            if (p && p.type) return { ...l, type: p.type };
            return l;
          })
          .filter(Boolean);
        // aggiungi nuovi
        for (const l of (payload.addLinks || [])) {
          const exists = next.links.some(x => (x.source===l.source && x.target===l.target) || (x.source===l.target && x.target===l.source));
          if (!exists) next.links.push(l);
        }
      } else if (payload.kind === "link") {
        const exists = next.links.some(x => (x.source===payload.link.source && x.target===payload.link.target) || (x.source===payload.link.target && x.target===payload.link.source));
        if (!exists) next.links.push(payload.link);
      } else if (payload.kind === "create_cluster") {
        // 1) push head
        next.nodes.push(payload.head);
        // 2) sposta members dentro il cluster
        next.nodes = next.nodes.map(n => payload.members.includes(n.id) ? { ...n, cluster: payload.head.id } : n);
        // 3) crea link head ↔ hub se richiesto
        if (payload.linkToHub) {
          const exists = next.links.some(x => (x.source==="hub" && x.target===payload.head.id) || (x.source===payload.head.id && x.target==="hub"));
          if (!exists) next.links.push({ source: "hub", target: payload.head.id, type: payload.linkType });
        }
        // 4) crea link head ↔ ogni membro (se non esiste)
        for (const mid of payload.members) {
          const exists = next.links.some(x => (x.source===payload.head.id && x.target===mid) || (x.source===mid && x.target===payload.head.id));
          if (!exists) next.links.push({ source: payload.head.id, target: mid, type: "uses" });
        }
      }
      return next;
    });
    setEditorOpen(false);
    setEditingNode(null);
  };

  const handleDelete = (node) => {
    if (node.id === "hub") return;
    if (!confirm(`Eliminare il nodo "${node.label}" e tutte le sue connessioni?`)) return;
    setData(prev => ({
      ...prev,
      nodes: prev.nodes.filter(n => n.id !== node.id),
      links: prev.links.filter(l => l.source !== node.id && l.target !== node.id)
    }));
    setSelectedId(null);
  };

  const onResetData = () => {
    if (!confirm("Ripristinare i dati di default? Tutte le modifiche personalizzate andranno perse.")) return;
    setData(window.resetNeuralData());
    setSelectedId(null);
  };

  return (
    <div className="stage">
      <div id="three-container" ref={containerRef}/>
      <div className="vignette"/>

      <Sidebar
        data={data}
        activeCats={activeCats}
        setActiveCats={setActiveCats}
        searchQuery={searchQuery}
        setSearchQuery={setSearchQuery}
        totals={totals}
        focusNode={focusNode}
        openEditor={() => { setEditingNode(null); setEditorOpen(true); setClusterCreatorOpen(false); }}
        openClusterEditor={() => { setClusterCreatorOpen(true); setEditorOpen(false); setEditingNode(null); }}
      />

      <TopBar
        totals={totals}
        focusMode={focusMode}
        setFocusMode={setFocusMode}
        selectedId={selectedId}
        onResetData={onResetData}
      />

      {!editorOpen && !clusterCreatorOpen && selectedNode && (
        <NodePanel
          data={data}
          node={selectedNode}
          onClose={() => { setSelectedId(null); setFocusMode(false); }}
          focusNode={focusNode}
          setFocusMode={setFocusMode}
          focusMode={focusMode}
          onEdit={(node) => { setEditingNode(node); setEditorOpen(true); }}
          onDelete={handleDelete}
        />
      )}

      {editorOpen && (
        <EditorPanel
          data={data}
          editingNode={editingNode}
          defaultConnect={selectedId}
          onClose={() => { setEditorOpen(false); setEditingNode(null); }}
          onSave={handleSave}
        />
      )}

      {clusterCreatorOpen && (
        <ClusterCreator
          data={data}
          onClose={() => setClusterCreatorOpen(false)}
          onSave={handleSave}
        />
      )}

      {!selectedNode && !editorOpen && !clusterCreatorOpen && (
        <div className={`hint-card ${hintVisible ? "" : "hidden"}`}>
          <div><span className="hk">L-click + drag</span> sposta i pianeti</div>
          <div><span className="hk">Rotella premuta + drag</span> ruota la visuale</div>
          <div><span className="hk">R-click + drag</span> pan libero</div>
          <div><span className="hk">Scroll</span> zoom lineare</div>
          <div><span className="hk">Click</span> nodo per dettagli · <span className="hk">Doppio click</span> per URL</div>
        </div>
      )}

      <div className="status">
        <span className="dot" style={{background:"#34D399", boxShadow:"0 0 8px #34D399"}}/>
        <span>{totals.nodes} nodi · {totals.links} sinapsi attive</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
