<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuratore Preventivi — PLURIAGENCY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06060a; --panel:#0d0d14; --panel2:#121218;
  --border:rgba(155,92,255,0.15); --border2:rgba(155,92,255,0.3);
  --v:#9b5cff; --v2:#c89bff; --v-dim:rgba(155,92,255,0.12);
  --g1:#00ff88; --g3:#00cfff;
  --text:#e8e8f0; --muted:#6b6b80;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.4;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
  background:repeating-linear-gradient(to bottom,transparent,transparent 2px,rgba(0,0,0,0.07) 3px);}

/* HEADER */
.cfg-header{padding:2.5rem 3rem 2rem;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(155,92,255,0.06) 0%,transparent 100%);
  position:relative;overflow:hidden;}
.cfg-header::before{content:'';position:absolute;top:-100px;right:-60px;width:400px;height:400px;
  background:radial-gradient(circle,rgba(155,92,255,0.08) 0%,transparent 65%);pointer-events:none;}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:flex-end;
  justify-content:space-between;gap:2rem;flex-wrap:wrap;}
.eyebrow{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--v);margin-bottom:.75rem;}
.cfg-title{font-family:'Orbitron',monospace;font-size:clamp(1.6rem,4vw,2.8rem);
  font-weight:900;letter-spacing:2px;color:var(--text);}
.cfg-title span{color:var(--v);text-shadow:0 0 20px rgba(155,92,255,0.4);}
.header-note{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.06em;
  color:var(--muted);text-align:right;line-height:1.8;}

/* AGENT/CLIENT INFO */
.meta-row{max-width:1100px;margin:2rem auto 0;padding:0 3rem;
  display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.meta-field{display:flex;flex-direction:column;gap:.4rem;}
.meta-label{font-family:'Share Tech Mono',monospace;font-size:.6rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--v);}
.meta-input{background:var(--panel);border:1px solid var(--border);color:var(--text);
  padding:.75rem 1rem;font-family:'Share Tech Mono',monospace;font-size:.9rem;
  outline:none;transition:border-color .2s;letter-spacing:.05em;}
.meta-input:focus{border-color:var(--v);box-shadow:0 0 0 1px rgba(155,92,255,.2);}
.meta-input::placeholder{color:var(--muted);}

/* LAYOUT */
.cfg-layout{max-width:1100px;margin:2rem auto;padding:0 3rem;
  display:grid;grid-template-columns:1fr 380px;gap:2rem;align-items:start;}

/* SERVICE SELECTOR */
.selector-panel{background:var(--panel);border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.cat-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.cat-tab{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.18em;
  text-transform:uppercase;padding:.75rem 1.25rem;background:transparent;border:none;
  color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;
  transition:all .2s;outline:none;}
.cat-tab:hover{color:var(--text);}
.cat-tab.active{color:var(--v);border-bottom-color:var(--v);background:var(--v-dim);}

.cat-body{display:none;padding:1rem;}
.cat-body.visible{display:block;}

/* SERVICE ITEM */
.svc-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .8rem;
  border:1px solid transparent;border-radius:2px;cursor:pointer;
  transition:all .2s;margin-bottom:.3rem;position:relative;}
.svc-item:hover{border-color:var(--border);background:var(--v-dim);}
.svc-item.selected{border-color:var(--border2);background:var(--v-dim);}
.svc-check{width:16px;height:16px;border:1px solid var(--muted);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .2s;}
.svc-item.selected .svc-check{border-color:var(--v);background:var(--v);}
.svc-check-mark{width:8px;height:8px;background:#000;opacity:0;transition:opacity .2s;}
.svc-item.selected .svc-check-mark{opacity:1;}
.svc-info{flex:1;min-width:0;}
.svc-name{font-size:.85rem;font-weight:500;color:var(--text);letter-spacing:.01em;}
.svc-sub{font-size:.72rem;color:var(--muted);margin-top:.1rem;font-style:italic;}
.svc-price-tag{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--v);
  white-space:nowrap;flex-shrink:0;}
.svc-item .qty-ctrl{display:none;align-items:center;gap:.4rem;flex-shrink:0;}
.svc-item.selected .qty-ctrl{display:flex;}
.qty-btn{width:22px;height:22px;border:1px solid var(--border2);background:transparent;
  color:var(--v);font-size:14px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .15s;line-height:1;}
.qty-btn:hover{background:var(--v);color:#000;}
.qty-val{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--text);
  min-width:14px;text-align:center;}

/* SUMMARY PANEL */
.summary-panel{position:sticky;top:1.5rem;background:var(--panel);
  border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.summary-header{padding:.9rem 1.25rem;border-bottom:1px solid var(--border);
  font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--v);display:flex;align-items:center;gap:.75rem;}
.summary-header::after{content:'';flex:1;height:1px;background:var(--border);}
.summary-count{font-family:'Share Tech Mono',monospace;font-size:.65rem;
  background:var(--v);color:#000;padding:.15rem .5rem;font-weight:700;
  display:none;}
.summary-count.visible{display:inline;}
.summary-lines{padding:.5rem 1.25rem;min-height:100px;max-height:260px;overflow-y:auto;}
.summary-empty{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--muted);
  padding:.5rem 0;letter-spacing:.05em;}
.summary-line{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:.35rem;
  padding:.45rem 0;border-bottom:1px solid rgba(155,92,255,.07);}
.summary-line:last-child{border-bottom:none;}
.s-name{font-size:.77rem;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.s-qty{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--muted);white-space:nowrap;}
.s-amt{font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--v);white-space:nowrap;text-align:right;cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .15s;}
.s-amt:hover{border-bottom-color:var(--v);}
.s-edit-btn{width:16px;height:16px;background:transparent;border:none;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;transition:color .15s;font-size:9px;}
.s-edit-btn:hover{color:var(--v);}
.s-price-input{font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--v);
  background:transparent;border:none;border-bottom:1px solid var(--v);outline:none;
  width:60px;text-align:right;padding:0 2px;}

/* SUBTOTAL / DISCOUNT */
.discount-row{padding:.75rem 1.25rem;border-top:1px solid var(--border);
  display:grid;grid-template-columns:1fr auto;align-items:center;gap:.75rem;}
.discount-label{font-family:'Share Tech Mono',monospace;font-size:.62rem;
  letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
.discount-input{background:transparent;border:1px solid var(--border);color:var(--text);
  padding:.35rem .75rem;font-family:'Share Tech Mono',monospace;font-size:.85rem;
  outline:none;width:80px;text-align:right;transition:border-color .2s;}
.discount-input:focus{border-color:var(--v);}
.total-row{padding:1rem 1.25rem;background:var(--v-dim);
  border-top:1px solid var(--border2);}
.total-label{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;}
.total-value{font-family:'Orbitron',monospace;font-size:1.7rem;font-weight:900;
  color:var(--v);text-shadow:0 0 20px rgba(155,92,255,.4);}
.total-saved{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--g1);
  margin-top:.3rem;letter-spacing:.05em;}

/* SEND FORM */
.send-section{padding:1.25rem;border-top:1px solid var(--border);}
.send-field{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.75rem;}
.send-label{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted);}
.send-input{background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:.6rem .9rem;font-family:'Share Tech Mono',monospace;font-size:.82rem;
  outline:none;transition:border-color .2s;}
.send-input:focus{border-color:var(--v);}
.send-input::placeholder{color:var(--muted);}
.send-textarea{resize:vertical;min-height:70px;font-family:'Inter',sans-serif;font-size:.83rem;}
.send-checks{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.75rem;}
.send-check-label{display:flex;align-items:center;gap:.5rem;font-family:'Share Tech Mono',monospace;
  font-size:.65rem;letter-spacing:.08em;color:var(--muted);cursor:pointer;}
.send-check-label input[type="checkbox"]{accent-color:var(--v);}
.send-btn{width:100%;font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;
  letter-spacing:3px;padding:14px 20px;border:1px solid var(--v);color:var(--v);
  background:transparent;cursor:pointer;text-transform:uppercase;transition:all .2s;
  position:relative;overflow:hidden;}
.send-btn::before{content:'';position:absolute;inset:0;background:var(--v);
  transform:translateX(-100%);transition:transform .25s;}
.send-btn span{position:relative;z-index:1;}
.send-btn:hover::before{transform:translateX(0);}
.send-btn:hover span{color:#000;}
.send-btn:disabled{opacity:.5;cursor:not-allowed;}
.send-btn:disabled::before{display:none;}

.footer-cfg{text-align:center;padding:2rem;border-top:1px solid var(--border);
  font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--muted);
  letter-spacing:.1em;margin-top:2rem;}

@media(max-width:900px){
  .cfg-header,.meta-row,.cfg-layout{padding-left:1.25rem;padding-right:1.25rem;}
  .cfg-layout{grid-template-columns:1fr;}
  .summary-panel{position:static;}
  .meta-row{grid-template-columns:1fr;}
  .header-note{text-align:left;}
}
</style>
</head>
<body>

<header class="cfg-header">
  <div class="header-inner">
    <div>
      <div class="eyebrow">// PLURIAGENCY — CONFIGURATORE PREVENTIVI</div>
      <div class="cfg-title">CREA IL TUO <span>PREVENTIVO</span></div>
    </div>
    <div class="header-note">
      Solo per uso interno — accesso riservato<br>
      Prezzi indicativi · IVA esclusa<br>
      Dati non salvati — usa una volta
    </div>
  </div>
</header>

<!-- AGENT / CLIENT INFO -->
<div class="meta-row">
  <div class="meta-field">
    <label class="meta-label">NOME CLIENTE</label>
    <input class="meta-input" id="client-name" type="text" placeholder="Es. Mario Rossi / Azienda SRL">
  </div>
  <div class="meta-field">
    <label class="meta-label">NOME AGENTE</label>
    <input class="meta-input" id="agent-name" type="text" placeholder="Es. Lorenzo Attinà">
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="cfg-layout">

  <!-- SERVICE SELECTOR -->
  <div class="selector-panel">
    <div class="cat-tabs" id="cat-tabs"></div>
    <div id="cat-bodies"></div>
  </div>

  <!-- SUMMARY + SEND -->
  <div class="summary-panel">
    <div class="summary-header">PREVENTIVO <span class="summary-count" id="summary-count">0</span></div>
    <div class="summary-lines" id="summary-lines">
      <div class="summary-empty" id="summary-empty">&gt; nessun servizio selezionato_</div>
    </div>

    <!-- DISCOUNT -->
    <div class="discount-row">
      <div>
        <div class="discount-label">SCONTO</div>
      </div>
      <div style="display:flex;align-items:center;gap:.4rem;">
        <input class="discount-input" id="discount-val" type="number" min="0" max="100" value="0" oninput="recalc()">
        <span style="font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--muted)">%</span>
      </div>
    </div>

    <!-- TOTAL -->
    <div class="total-row">
      <div class="total-label">TOTALE STIMATO</div>
      <div class="total-value" id="total-value">€ 0</div>
      <div class="total-saved" id="total-saved" style="display:none"></div>
    </div>

    <!-- SEND -->
    <div class="send-section">
      <div class="send-field">
        <label class="send-label">EMAIL DESTINATARIO</label>
        <input class="send-input" id="send-email" type="email" placeholder="cliente@email.com">
      </div>
      <div class="send-field">
        <label class="send-label">NOTE INTERNE</label>
        <textarea class="send-input send-textarea" id="send-notes" placeholder="Note aggiuntive, dettagli tempistiche, condizioni speciali..."></textarea>
      </div>
      <div class="send-checks">
        <label class="send-check-label">
          <input type="checkbox" id="send-to-agency" checked>
          Invia a hello@pluriagency.com
        </label>
        <label class="send-check-label">
          <input type="checkbox" id="send-to-client">
          Invia copia al cliente
        </label>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendQuote()">
        <span>&#9654; INVIA PREVENTIVO</span>
      </button>
    </div>
  </div>

</div>

<div class="footer-cfg">PLURIAGENCY — STRUMENTO INTERNO — NON CONDIVIDERE</div>

<script>
// ===== SERVICES DATA =====
const CATS = [
  {
    id:'web', label:'SITI WEB',
    items:[
      {id:'web-az-b', name:'Sito Aziendale Basic', sub:'Presenza professionale solida e immediata', price:1700, priceMax:2200},
      {id:'web-az-p', name:'Digital Showroom 3D', sub:'Il tuo prodotto vive nello schermo — 3D interattivo', price:2500, priceMax:5000},
      {id:'web-ris-b', name:'Sito Ristorante Basic', sub:'Menu digitale smart, QR e delivery', price:1500, priceMax:2000},
      {id:'web-ris-p', name:'Sistema Vendita Ristorante', sub:'Il sito che lavora ogni sera al posto tuo', price:2500, priceMax:4500},
      {id:'web-pro-b', name:'Sito Professionista Basic', sub:'Il biglietto da visita digitale del 2025', price:1500, priceMax:2000},
      {id:'web-pro-p', name:'Digital Identity Tool', sub:'Strumento di acquisizione clienti', price:2200, priceMax:3500},
    ]
  },
  {
    id:'grafica', label:'GRAFICA',
    items:[
      {id:'g-logo', name:'Logo Design', sub:'Il simbolo che ti rappresenta ovunque', price:150, priceMax:500},
      {id:'g-brand', name:'Brand Kit Completo', sub:'Logo + palette + tipografia + guida', price:300, priceMax:1000},
      {id:'g-loc', name:'Locandina / Flyer', sub:'Stampa e digitale', price:80, priceMax:250},
      {id:'g-broch', name:'Brochure / Catalogo', sub:'Layout professionale su misura', price:150, priceMax:500},
      {id:'g-deck', name:'Deck / Presentazione', sub:'Pitch, proposta commerciale', price:150, priceMax:400},
      {id:'g-music', name:'Grafica Musica & Eventi', sub:'Artwork release, visual DJ', price:80, priceMax:400},
      {id:'g-card', name:'Business Card', sub:'Coordinata al brand + QR digitale', price:150, priceMax:350},
    ]
  },
  {
    id:'foto', label:'FOTO & VIDEO',
    items:[
      {id:'f-base', name:'Shooting Base', sub:'Ritratto, prodotto, locale', price:200, priceMax:400},
      {id:'f-pro', name:'Shooting Pro Multi-camera', sub:'Team senior, risultati che si vedono', price:500, priceMax:1500},
      {id:'v-reel', name:'Reel / Short Video', sub:'Per Instagram, TikTok, LinkedIn', price:150, priceMax:300},
      {id:'v-ist', name:'Video Istituzionale', sub:'Racconta l\'azienda con il peso che merita', price:500, priceMax:2000},
    ]
  },
  {
    id:'treed', label:'3D & VISUAL',
    items:[
      {id:'3d-base', name:'Modello 3D Base', sub:'Oggetto semplice pronto per il web .GLB', price:150, priceMax:400},
      {id:'3d-render', name:'Rendering Prodotto Realistico', sub:'PBR, materiali fotorealistici', price:500, priceMax:1500},
      {id:'3d-anim', name:'Animazione 3D', sub:'Spot, hero video, animazione prodotto', price:400, priceMax:1200},
      {id:'3d-cgi', name:'Scena CGI / Visual', sub:'Compositing, scena architettonica', price:600, priceMax:2000},
    ]
  },
  {
    id:'auto', label:'AUTOMAZIONI',
    items:[
      {id:'auto-email', name:'Email Automation & CRM', sub:'Flussi automatici dai contatti', price:400, priceMax:1200},
      {id:'auto-chat', name:'Chatbot AI Personalizzato', sub:'Assistente AI integrato nel sito', price:600, priceMax:2000},
      {id:'auto-dash', name:'Dashboard Analytics', sub:'Monitor dati in tempo reale', price:500, priceMax:1500},
      {id:'auto-flow', name:'Workflow Personalizzato', sub:'Integrazione tool aziendali', price:350, priceMax:900},
    ]
  },
  {
    id:'pack', label:'PACCHETTI',
    items:[
      {id:'p-media', name:'Sistema Media Ristorante', sub:'Schermo + shooting mensile / canone', price:300, priceMax:300, monthly:true},
      {id:'p-senior', name:'Shooting Senior — Team', sub:'3 fotografi + 1 videomaker senior', price:600, priceMax:1200},
      {id:'p-lancio', name:'Lancio Prodotto', sub:'Tutto chiavi in mano', price:800, priceMax:2000},
      {id:'p-kit', name:'Kit Identità Fisica + Digitale', sub:'Sito + business card + shooting', price:2800, priceMax:4000},
      {id:'p-tutor', name:'Marketing Tutoring', sub:'Strategia, visual, comunicazione', price:500, priceMax:1500},
      {id:'p-retainer', name:'Retainer Grafica Mensile', sub:'8 asset/mese, turnaround 48h', price:350, priceMax:700, monthly:true},
    ]
  },
  {
    id:'maint', label:'MANUTENZIONE',
    items:[
      {id:'m-basic', name:'Basic Care', sub:'Sicurezza, backup, uptime / anno', price:100, priceMax:100, yearly:true},
      {id:'m-std', name:'Standard Care', sub:'Basic + 5 modifiche / anno', price:250, priceMax:250, yearly:true},
      {id:'m-prem', name:'Premium Care', sub:'Modifiche illimitate + priority / anno', price:500, priceMax:500, yearly:true},
      {id:'mc-mod', name:'Modifica Contenuto', sub:'Testi, immagini, prezzi', price:30, priceMax:60},
      {id:'mc-pag', name:'Nuova Pagina / Sezione', sub:'Aggiunta strutturale al sito', price:150, priceMax:400},
      {id:'mc-blog', name:'Setup Blog', sub:'Template + struttura + 3 articoli', price:300, priceMax:600},
    ]
  },
];

// State
const selected = {}; // { id: { item, qty, priceUsed } }
let _emptyEl = null; // cached after first DOM access

// Build UI
function buildUI(){
  const tabsEl = document.getElementById('cat-tabs');
  const bodiesEl = document.getElementById('cat-bodies');

  const CAT_ICONS = {web:'◈', grafica:'◉', foto:'◎', treed:'◆', auto:'⬡', pack:'⬣', maint:'⬤'};
  CATS.forEach((cat, ci) => {
    // Tab
    const tab = document.createElement('button');
    tab.className = `cat-tab${ci===0?' active':''}`;
    tab.textContent = (CAT_ICONS[cat.id]||'◇') + ' ' + cat.label;
    tab.onclick = () => switchTab(cat.id);
    tab.dataset.cat = cat.id;
    tabsEl.appendChild(tab);

    // Body
    const body = document.createElement('div');
    body.className = `cat-body${ci===0?' visible':''}`;
    body.id = `body-${cat.id}`;

    cat.items.forEach(item => {
      const label = item.monthly ? '/mese' : item.yearly ? '/anno' : '';
      const priceStr = item.priceMax > item.price
        ? `${item.price}–${item.priceMax}€${label}`
        : `${item.price}€${label}`;

      const div = document.createElement('div');
      div.className = 'svc-item';
      div.id = `item-${item.id}`;
      div.innerHTML = `
        <div class="svc-check"><div class="svc-check-mark"></div></div>
        <div class="svc-info">
          <div class="svc-name">${item.name}</div>
          <div class="svc-sub">${item.sub}</div>
        </div>
        <div class="svc-price-tag">${priceStr}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty('${item.id}',-1,event)">−</button>
          <span class="qty-val" id="qty-${item.id}">1</span>
          <button class="qty-btn" onclick="changeQty('${item.id}',1,event)">+</button>
        </div>`;
      div.onclick = (e) => {
        if(e.target.classList.contains('qty-btn')) return;
        toggleItem(item);
      };
      body.appendChild(div);
    });

    bodiesEl.appendChild(body);
  });
}

function switchTab(catId){
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===catId));
  document.querySelectorAll('.cat-body').forEach(b=>b.classList.toggle('visible',b.id===`body-${catId}`));
}

function toggleItem(item){
  const el = document.getElementById(`item-${item.id}`);
  if(selected[item.id]){
    delete selected[item.id];
    el.classList.remove('selected');
  } else {
    selected[item.id] = {item, qty:1, priceUsed: item.price};
    el.classList.add('selected');
  }
  recalc();
  renderSummary();
}

function changeQty(id, dir, e){
  e.stopPropagation();
  if(!selected[id]) return;
  selected[id].qty = Math.max(1, selected[id].qty + dir);
  document.getElementById(`qty-${id}`).textContent = selected[id].qty;
  recalc(); renderSummary();
}

function recalc(){
  const disc = Math.min(100, Math.max(0, parseFloat(document.getElementById('discount-val').value)||0));
  let sub = 0;
  Object.values(selected).forEach(s => { sub += s.priceUsed * s.qty; });
  const saved = sub * disc / 100;
  const total = sub - saved;

  document.getElementById('total-value').textContent = `€ ${total.toLocaleString('it-IT', {maximumFractionDigits:0})}`;
  const savedEl = document.getElementById('total-saved');
  if(disc > 0 && saved > 0){
    savedEl.style.display = 'block';
    savedEl.textContent = `▼ sconto ${disc}% = −€${Math.round(saved).toLocaleString('it-IT')}`;
  } else {
    savedEl.style.display = 'none';
  }

  // Update counter badge
  const n = Object.keys(selected).length;
  const countEl = document.getElementById('summary-count');
  if(countEl){ countEl.textContent = n; countEl.classList.toggle('visible', n > 0); }
}

function renderSummary(){
  const linesEl = document.getElementById('summary-lines');
  if(!_emptyEl) _emptyEl = document.getElementById('summary-empty');
  const keys = Object.keys(selected);

  if(!keys.length){
    // Remove all dynamic lines, show empty message
    Array.from(linesEl.querySelectorAll('.summary-line')).forEach(el=>el.remove());
    if(_emptyEl && !_emptyEl.parentElement) linesEl.appendChild(_emptyEl);
    if(_emptyEl) _emptyEl.style.display = 'block';
    return;
  }

  // Hide empty message without removing it from DOM
  if(_emptyEl) _emptyEl.style.display = 'none';

  // Sync DOM lines with selected state
  // Remove lines that are no longer selected
  Array.from(linesEl.querySelectorAll('.summary-line')).forEach(el => {
    if(!selected[el.dataset.id]) el.remove();
  });

  // Add/update lines in order
  keys.forEach(id => {
    const {item, qty, priceUsed} = selected[id];
    const lineTotal = priceUsed * qty;
    const suffix = item.monthly ? '/mese' : item.yearly ? '/anno' : '';
    let lineEl = linesEl.querySelector(`.summary-line[data-id="${id}"]`);
    if(!lineEl){
      lineEl = document.createElement('div');
      lineEl.className = 'summary-line';
      lineEl.dataset.id = id;
      linesEl.appendChild(lineEl);
    }
    lineEl.innerHTML = `
      <div class="s-name">${item.name}</div>
      <div class="s-qty">${qty > 1 ? '×'+qty : ''}</div>
      <div class="s-amt" title="Clicca per modificare il prezzo" onclick="editPrice('${id}',this)">€${lineTotal.toLocaleString('it-IT')}${suffix}</div>
      <button class="s-edit-btn" onclick="editPrice('${id}',this.previousElementSibling)" title="Modifica prezzo">✎</button>`;
  });
}

function editPrice(id, amtEl){
  if(!selected[id]) return;
  if(amtEl.querySelector('input')) return; // già in edit
  const {item, qty, priceUsed} = selected[id];
  const suffix = item.monthly ? '/mese' : item.yearly ? '/anno' : '';
  const input = document.createElement('input');
  input.type = 'number'; input.className = 's-price-input';
  input.value = priceUsed; input.min = 0;
  input.style.width = Math.max(50, String(priceUsed).length * 9 + 20) + 'px';
  amtEl.textContent = '';
  amtEl.appendChild(input);
  input.focus(); input.select();
  const commit = () => {
    const val = Math.max(0, parseFloat(input.value) || 0);
    selected[id].priceUsed = val;
    const total = val * qty;
    amtEl.textContent = `€${total.toLocaleString('it-IT')}${suffix}`;
    recalc();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if(e.key==='Enter'){ commit(); input.blur(); } if(e.key==='Escape'){ amtEl.textContent=`€${(priceUsed*qty).toLocaleString('it-IT')}${suffix}`; } });
}

async function sendQuote(){
  const clientName = document.getElementById('client-name').value.trim();
  const agentName = document.getElementById('agent-name').value.trim();
  const email = document.getElementById('send-email').value.trim();
  const notes = document.getElementById('send-notes').value.trim();
  const toAgency = document.getElementById('send-to-agency').checked;
  const toClient = document.getElementById('send-to-client').checked;
  const disc = parseFloat(document.getElementById('discount-val').value)||0;

  if(!email && toClient){ alert('Inserisci email del cliente.'); return; }
  if(Object.keys(selected).length === 0){ alert('Seleziona almeno un servizio.'); return; }

  let sub = 0;
  const lines = [];
  Object.values(selected).forEach(({item, qty, priceUsed}) => {
    const line = priceUsed * qty;
    sub += line;
    const suffix = item.monthly ? '/mese' : item.yearly ? '/anno' : '';
    lines.push(`${item.name}${qty > 1 ? ' ×'+qty : ''}: €${line.toLocaleString('it-IT')}${suffix}`);
  });
  const saved = Math.round(sub * disc / 100);
  const total = sub - saved;

  const btn = document.getElementById('send-btn');
  btn.querySelector('span').textContent = '⟳ INVIO...';
  btn.disabled = true;

  const payload = {
    type: 'quote',
    agentName: agentName || 'Agente',
    clientName: clientName || 'Cliente',
    email,
    toAgency,
    toClient,
    lines,
    subtotal: sub,
    discount: disc,
    saved,
    total,
    notes
  };

  try {
    const r = await fetch('/api/quote', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if(r.ok){
      btn.querySelector('span').textContent = '✓ PREVENTIVO INVIATO';
    } else {
      btn.querySelector('span').textContent = '✗ ERRORE — RIPROVA';
      btn.disabled = false;
    }
  } catch {
    btn.querySelector('span').textContent = '✗ CONNESSIONE — RIPROVA';
    btn.disabled = false;
  }
}

buildUI();
</script>
